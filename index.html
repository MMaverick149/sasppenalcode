<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Policejní Databáze - Inteligentní Sazebník</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #121212; --accent: #ffcc00;
            --input-bg: #181818; --text: #e0e0e0; --border: #282828;
            --danger: #ff4444; --jail: #4dabf7; --fine: #69db7c;
            --warning: #ffcc00; /* Barva pro varování v sazebníku */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* SCANNER LINE EFEKT */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        b, strong { color: var(--accent); }

        .main-content { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        
        .header-area { padding: 20px 25px; border-bottom: 2px solid var(--border); background: #050505; }
        .main-title {
            color: #ffffff; font-size: 22px; font-weight: 900; letter-spacing: 3px;
            text-transform: uppercase; margin-bottom: 15px; text-align: center;
            border-bottom: 3px solid var(--accent); padding-bottom: 12px;
        }

        #searchInput { 
            width: 100%; background: var(--input-bg); border: 1px solid #444; color: white;
            padding: 12px; border-radius: 4px; outline: none; border-left: 5px solid var(--accent);
        }

        .laws-list { flex: 1; padding: 20px; overflow-y: auto; }
        .law-card { background: var(--card); border: 1px solid var(--border); margin-bottom: 8px; border-radius: 4px; }
        
        .law-header { padding: 12px 15px; border-left: 4px solid var(--accent); cursor: pointer; display: flex; align-items: center; gap: 15px; background: #111; }
        .law-title { color: var(--accent); font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .law-header-desc { font-size: 11px; color: #666; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .law-content { display: none; background: #080808; }
        .law-card.active .law-content { display: block; }
        
        .sub-row { padding: 12px 15px; border-top: 1px solid #1a1a1a; }
        .row-main { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .sub-text { flex: 1; font-size: 12px; color: #ccc; line-height: 1.4; }
        
        .input-group { display: flex; gap: 10px; align-items: center; }
        
        /* INPUTY S VALIDACÍ */
        .input-box { 
            background: #111; border: 1px solid #333; color: white; padding: 8px; 
            width: 100px; border-radius: 3px; text-align: center; font-size: 12px; outline: none; transition: 0.3s;
        }
        /* Třída pro varování, když je trest mimo rozsah */
        .input-box.out-of-range {
            border-color: var(--warning) !important;
            box-shadow: 0 0 8px rgba(255, 204, 0, 0.4);
            color: var(--warning) !important;
            background: #1a1600;
        }
        
        .input-box[readonly] { background: #0a110a !important; border-color: #1b3d20 !important; color: #69db7c !important; cursor: not-allowed; }

        .btn-add { background: var(--accent); color: black; border: none; width: 35px; height: 35px; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 20px; }

        /* SIDEBAR */
        .sidebar { width: 380px; background: #080808; padding: 20px; display: flex; flex-direction: column; }
        .sidebar-title { color: var(--accent); text-align: center; font-size: 16px; letter-spacing: 2px; margin-bottom: 20px; font-weight: bold; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .case-entries { flex: 1; overflow-y: auto; }
        .case-item { position: relative; background: #111; padding: 12px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #222; border-left: 3px solid var(--accent); }
        .btn-remove { position: absolute; top: 5px; right: 8px; background: transparent; color: #555; border: none; cursor: pointer; font-size: 18px; }

        .summary-box { background: #111; padding: 15px; border-radius: 6px; border: 1px solid var(--accent); margin-top: 15px; }
        .summary-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; margin-bottom: 8px; }
        .btn-clear { width:100%; padding:12px; background:#1a1a1a; color:var(--danger); border:1px solid #333; cursor:pointer; font-weight:bold; font-size:11px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="header-area">
        <div class="main-title">POLICAJNÍ DATABAZE - PENAL CODE - GenK</div>
        <input type="text" id="searchInput" placeholder="Vyhledat paragraf nebo trestný čin..." onkeyup="filterLaws()">
    </div>
    <div class="laws-list" id="lawsContainer"></div>
</div>

<div class="sidebar">
    <div class="sidebar-title">PROTOKOL</div>
    <div class="case-entries" id="caseEntries"></div>
    <div class="summary-box">
        <div class="summary-row"><span>VĚZENÍ:</span> <span id="totalJail" style="color:var(--jail)">0 let</span></div>
        <div class="summary-row"><span>POKUTA:</span> <span id="totalFine" style="color:var(--fine)">0 $</span></div>
        <button class="btn-clear" onclick="location.reload()">VYMAZAT PŘÍPAD</button>
    </div>
</div>

<script>
    let activeCaseItems = [];

    // FUNKCE PRO ZÍSKÁNÍ ROZSAHU Z TEXTU (např. "5-10" -> {min:5, max:10})
    function getRange(text) {
        let cleanText = text.replace(/(\d)\.(\d{3})/g, '$1$2'); // Odstraní tečky v tisících (1.000 -> 1000)
        let match = cleanText.match(/(\d+)\s*-\s*(\d+)/);
        if (match) return { min: parseInt(match[1]), max: parseInt(match[2]) };
        
        let maxMatch = cleanText.match(/(?:do|max)\s*(\d+)/i);
        if (maxMatch) return { min: 0, max: parseInt(maxMatch[1]) };
        
        return null;
    }

    // VALIDACE INPUTU
    function validateInput(el, min, max) {
        let val = parseInt(el.value);
        if (!isNaN(val) && (val < min || val > max)) {
            el.classList.add('out-of-range');
        } else {
            el.classList.remove('out-of-range');
        }
    }

    async function loadLaws() {
        const container = document.getElementById('lawsContainer');
        const response = await fetch('tresty.html?v=' + Date.now());
        const html = await response.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        
        temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
            const title = item.getAttribute('data-title') || "Paragraf";
            const desc = item.querySelector('.law-description')?.innerText || "";
            let rows = "";

            item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                const fixFine = line.getAttribute('data-fix-fine');
                const fixJail = line.getAttribute('data-fix-jail');
                const innerH = line.innerHTML;
                
                // Detekce rozsahů pro validaci
                const jailRange = getRange(innerH.includes('let') || innerH.includes('rok') ? innerH : "");
                const fineRange = getRange(innerH.includes('$') ? innerH : "");

                const jPlace = jailRange ? `${jailRange.min}-${jailRange.max}` : "Let";
                const fPlace = fineRange ? `${fineRange.min}-${fineRange.max}` : "Suma";

                rows += `
                <div class="sub-row">
                    <div class="row-main">
                        <div class="sub-text">${innerH.split("ODEBRAT")[0]}</div>
                        <div class="input-group">
                            <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" 
                                value="${fixJail || ''}" placeholder="${jPlace}" ${fixJail !== null ? 'readonly' : ''}
                                oninput="validateInput(this, ${jailRange?.min || 0}, ${jailRange?.max || 999})">
                            
                            <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" 
                                value="${fixFine || ''}" placeholder="${fPlace}" ${fixFine !== null ? 'readonly' : ''}
                                oninput="validateInput(this, ${fineRange?.min || 0}, ${fineRange?.max || 999999})">
                            
                            <button class="btn-add" onclick="addToCase('${title}', '${line.innerText.replace(/'/g,"\\'")}', ${lIdx}, ${rIdx})">+</button>
                        </div>
                    </div>
                </div>`;
            });

            const card = document.createElement('div');
            card.className = 'law-card';
            card.innerHTML = `<div class="law-header" onclick="this.parentElement.classList.toggle('active')">
                <div class="law-title">${title}</div><div class="law-header-desc">${desc}</div>
            </div><div class="law-content">${rows}</div>`;
            container.appendChild(card);
        });
    }

    function addToCase(title, fullText, lIdx, rIdx) {
        const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
        const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
        if (j === 0 && f === 0) return;
        activeCaseItems.push({ title, jail: j, fine: f });
        renderCase();
    }

    function renderCase() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = "";
        let jT = 0, fT = 0;
        activeCaseItems.forEach((i, idx) => {
            jT += i.jail; fT += i.fine;
            const div = document.createElement('div');
            div.className = 'case-item';
            div.innerHTML = `<button class="btn-remove" onclick="removeEntry(${idx})">×</button>
                <span class="item-title">${i.title}</span>
                <div class="item-vals"><span style="color:var(--jail)">${i.jail} let</span><span style="color:var(--fine)">${i.fine.toLocaleString()} $</span></div>`;
            cont.appendChild(div);
        });
        document.getElementById('totalJail').innerText = jT + " let";
        document.getElementById('totalFine').innerText = fT.toLocaleString() + " $";
    }

    function removeEntry(idx) { activeCaseItems.splice(idx, 1); renderCase(); }
    function filterLaws() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.law-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none");
    }
    window.onload = loadLaws;
</script>
</body>
</html>
