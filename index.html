<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - MDT Terminal v76</title>
    <style>
        :root {
            --bg-main: #0a0b0d;
            --bg-panel: #14161a;
            --accent: #ffcc00;
            --danger: #ff4444;
            --jail-color: #00aaff;
            --fine-color: #00ff88;
            --border: #202124;
        }

        body { background: var(--bg-main); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        b { color: var(--accent); font-weight: 900; }

        #mainApp { display: flex; width: 100%; height: 100%; }
        #leftPanel { flex: 3; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #rightPanel { flex: 1.3; min-width: 450px; background: var(--bg-panel); display: flex; flex-direction: column; }

        .header-bar { padding: 20px 30px; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
        #lawsContainer { padding: 20px; overflow-y: auto; flex-grow: 1; background: #0c0d0f; }

        .law-card { background: var(--bg-panel); border: 1px solid var(--border); margin-bottom: 12px; border-radius: 8px; overflow: hidden; }
        .law-header { padding: 15px 20px; cursor: pointer; color: var(--accent); font-weight: 900; text-transform: uppercase; display: flex; justify-content: space-between; }
        .law-content { display: none; padding: 15px 20px; background: #111317; border-top: 1px solid var(--border); }
        .law-card.active .law-content { display: block; }

        /* INPUTY */
        .input-box { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; width: 90px; text-align: center; border-radius: 4px; font-weight: bold; outline: none; }
        .input-jail { border-color: var(--jail-color); }
        .input-fine { border-color: var(--fine-color); }
        
        /* ČERVENÉ BLOKOVÁNÍ DLE VELITELE */
        .input-box:disabled { border-color: var(--danger) !important; color: var(--danger) !important; opacity: 1; cursor: not-allowed; background: rgba(255, 68, 68, 0.1); }

        /* JEDINÝ ČERVENÝ ŠTÍTEK */
        .revoke-tag {
            background: var(--danger); color: white; padding: 4px 10px; border-radius: 4px;
            font-size: 11px; font-weight: 900; text-transform: uppercase; margin-left: 10px;
            display: inline-block; border: 1px solid rgba(255,255,255,0.3);
        }

        .protocol-item { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid var(--jail-color); margin-bottom: 10px; position: relative; }
        .summary-box { padding: 25px; background: #000; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="mainApp">
    <div id="leftPanel">
        <div class="header-bar">
            <h2 style="color:var(--accent); margin:0;">SASP MDT - TERMINÁL v76</h2>
            <div style="font-size: 11px; color: #555;">FIX: Rendering zákonů | Blokování pokut | Oprava ODEBRAT</div>
        </div>
        <div id="lawsContainer"></div>
    </div>

    <div id="rightPanel">
        <div style="padding:20px; border-bottom:1px solid var(--border); font-weight:900; color:var(--accent);">AKTIVNÍ PROTOKOL</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto; padding:15px;"></div>
        <div class="summary-box">
            <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:15px; font-size:20px;">
                <span>CELKEM:</span>
                <span><span id="sumJail" style="color:var(--jail-color)">0</span> L | <span id="sumFine" style="color:var(--fine-color)">0</span> $</span>
            </div>
            <button onclick="saveCase()" style="width:100%; padding:20px; background:var(--jail-color); color:white; border:none; border-radius:6px; font-weight:900; cursor:pointer; text-transform:uppercase;">Uložit do databáze</button>
        </div>
    </div>
</div>

<script>
    let protocol = [];
    
    // Kompletní databáze zákonů
    const lawsData = [
        {
            title: "§7 UBLÍŽENÍ NA ZDRAVÍ",
            subs: [
                { text: "a) neúmyslně a zbraní <b>sazba 1-5 let</b>", maxJ: 5, fixedF: null, revoke: false },
                { text: "b) úmyslně a zbraní <b>sazba 1-5 let</b>", maxJ: 5, fixedF: null, revoke: false },
                { text: "c) úmyslně a zbraní střelnou <b>sazba 3-10 let</b>", maxJ: 10, fixedF: null, revoke: false },
                { text: "d) úmyslně proti úřední osobě (5-15 let)", maxJ: 15, fixedF: 0, revoke: true },
                { text: "e) proti členům záchranných složek (10-20 let)", maxJ: 20, fixedF: 0, revoke: true }
            ]
        },
        {
            title: "§25 KRÁDEŽ",
            subs: [
                { text: "a) hodnota do 20.000$ (přestupek)", maxJ: 0, fixedF: null, revoke: false },
                { text: "b) hodnota do 200.000$ (1-3 roky)", maxJ: 3, fixedF: null, revoke: true }
            ]
        }
    ];

    function validate(el) {
        let v = parseInt(el.value);
        if (isNaN(v) || v < 0) el.value = 0;
    }

    function renderLaws() {
        const container = document.getElementById('lawsContainer');
        container.innerHTML = lawsData.map((law, lIdx) => `
            <div class="law-card">
                <div class="law-header" onclick="this.parentElement.classList.toggle('active')">
                    <span>${law.title}</span><span>▼</span>
                </div>
                <div class="law-content">
                    ${law.subs.map((sub, sIdx) => `
                        <div style="padding:10px 0; border-bottom:1px solid #222; display:flex; align-items:center; gap:10px;">
                            <div style="flex:1; font-size:12px;">
                                ${sub.text}
                                ${sub.revoke ? `<span class="revoke-tag">ODEBRAT PRŮKAZ</span>` : ''}
                            </div>
                            <input type="number" class="input-box input-jail" id="j_${lIdx}_${sIdx}" 
                                placeholder="Let" min="0" oninput="validate(this)" ${sub.maxJ === 0 ? 'disabled' : ''}>
                            
                            <input type="number" class="input-box input-fine" id="f_${lIdx}_${sIdx}" 
                                placeholder="$" min="0" oninput="validate(this)" 
                                ${sub.fixedF !== null ? 'disabled' : ''} value="${sub.fixedF !== null ? sub.fixedF : ''}">
                            
                            <button onclick="add(${lIdx}, ${sIdx})" style="background:var(--accent); border:none; padding:8px 12px; border-radius:4px; font-weight:900; cursor:pointer;">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const sub = lawsData[lIdx].subs[sIdx];
        const j = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        const f = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;

        protocol.push({ 
            id: Date.now(), 
            title: lawsData[lIdx].title, 
            jail: j, fine: f, 
            revoke: sub.revoke 
        });
        renderProtocol();
    }

    function renderProtocol() {
        const container = document.getElementById('caseEntries');
        container.innerHTML = protocol.map(p => `
            <div class="protocol-item">
                <button onclick="remove(${p.id})" style="position:absolute; right:10px; top:10px; background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
                <div style="color:var(--accent); font-weight:900; font-size:12px;">${p.title}</div>
                <div style="font-weight:900; margin-top:5px;">
                    <span style="color:var(--jail-color)">${p.jail} Let</span> | 
                    <span style="color:var(--fine-color)">$ ${p.fine.toLocaleString()}</span>
                </div>
                ${p.revoke ? `<div style="background:var(--danger); color:white; padding:5px; border-radius:4px; font-size:10px; font-weight:900; text-align:center; margin-top:8px;">⚠ ZABAVIT ZBROJNÍ PRŮKAZ</div>` : ''}
            </div>
        `).join('');
        
        document.getElementById('sumJail').innerText = protocol.reduce((a, b) => a + b.jail, 0);
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    function remove(id) { protocol = protocol.filter(p => p.id !== id); renderProtocol(); }
    function saveCase() { alert("Data byla odeslána na velitelství SASP."); protocol = []; renderProtocol(); }

    renderLaws();
</script>
</body>
</html>
