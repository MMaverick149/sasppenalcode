<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Penal Code</title>
    <style>
        :root { --accent: #ffcc00; --bg: #0d0d0d; --text: #e0e0e0; --jail: #4dabf7; --fine: #69db7c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .laws-section { flex: 1; overflow-y: auto; padding: 20px; border-right: 1px solid #333; }
        .law-card { background: #151515; border: 1px solid #333; margin-bottom: 10px; border-radius: 6px; overflow: hidden; }
        .law-header { background: #1a1a1a; padding: 12px 18px; cursor: pointer; border-left: 4px solid var(--accent); display: flex; flex-direction: column; }
        .law-title { color: var(--accent); font-weight: bold; font-size: 16px; }
        .law-desc { color: #888; font-size: 13px; font-style: italic; }
        .law-content { display: none; padding: 10px; background: #111; border-top: 1px solid #222; }
        .active .law-content { display: block; }
        .sub-row { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid #222; }
        .law-text-full { flex: 1; font-size: 14px; }
        .input-num { width: 70px; background: #222; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; text-align: center; }
        .btn-add { background: var(--accent); color: black; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .calc-sidebar { width: 400px; background: #0a0a0a; display: flex; flex-direction: column; padding: 20px; }
        .summary { background: #151515; padding: 20px; border-radius: 8px; border-top: 4px solid var(--accent); margin-top: auto; }
    </style>
</head>
<body>

    <div id="leftPanel">
        <input type="text" id="searchInput" placeholder="Hledat..." 
               style="width: 100%; padding: 10px; margin-bottom: 15px; background: #111; border: 1px solid #222; color: #ffcc00;" 
               oninput="filterLaws()">
        <div id="lawsContainer">Načítání...</div>
    </div>

    <div id="caseProtocol">
        <b style="color:var(--accent)">PROTOKOL</b>
        <div id="caseEntries"></div>
        <div class="summary-box">
            <div class="summary-line">Vězení: <span id="totalJail" style="color:var(--jail)">0 let</span></div>
            <div class="summary-line">Pokuta: <span id="totalFine" style="color:var(--fine)">0 $</span></div>
            <button onclick="clearAll()" style="width:100%; margin-top:10px; background:none; border:1px solid red; color:red; cursor:pointer; padding:5px;">Smazat případ</button>
        </div>
    </div>

    <script>
        let items = [];

        async function load() {
            const res = await fetch('tresty.html?v=' + Date.now());
            const html = await res.text();
            const temp = document.createElement('div');
            temp.innerHTML = html;
            const container = document.getElementById('lawsContainer');
            container.innerHTML = "";

            temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
                const title = item.getAttribute('data-title');
                const desc = item.querySelector('.law-description')?.innerText || "";
                let rows = "";

                item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                    const fF = line.getAttribute('data-fix-fine');
                    const fJ = line.getAttribute('data-fix-jail');
                    
                    rows += `
                    <div class="sub-line-row">
                        <div style="font-size:13px">${line.innerHTML}</div>
                        <div class="input-group">
                            <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" value="${fJ || ''}" placeholder="Let">
                            <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" value="${fF || ''}" placeholder="Suma">
                            <button class="btn-add" onclick="event.stopPropagation(); add('${title}', ${lIdx}, ${rIdx}, '${line.innerText.replace(/'/g,"")}')">+</button>
                        </div>
                    </div>`;
                });

                const card = document.createElement('div');
                card.className = 'law-card';
                card.onclick = function() { this.classList.toggle('active'); };
                card.innerHTML = `<div class="law-title">${title}</div><div class="law-description">${desc}</div><div class="law-content">${rows}</div>`;
                container.appendChild(card);
            });
        }

        function add(title, lIdx, rIdx, text) {
            const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
            const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
            items.push({ title, jail: j, fine: f });
            render();
        }

        function render() {
            const cont = document.getElementById('caseEntries');
            cont.innerHTML = "";
            let tj = 0, tf = 0;
            items.forEach((i, idx) => {
                tj += i.jail; tf += i.fine;
                cont.innerHTML += `<div class="case-item">
                    <div style="color:var(--accent); font-size:12px"><b>${i.title}</b></div>
                    <div style="display:flex; justify-content:space-between; font-size:13px; margin-top:5px;">
                        <span style="color:var(--jail)">${i.jail} let</span>
                        <span style="color:var(--fine)">${i.fine} $</span>
                    </div>
                </div>`;
            });
            document.getElementById('totalJail').innerText = tj + " let";
            document.getElementById('totalFine').innerText = tf + " $";
        }

        function filterLaws() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.law-card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(val) ? "block" : "none";
            });
        }

        function clearAll() { items = []; render(); }
        window.onload = load;
    </script>
</body>
</html>
