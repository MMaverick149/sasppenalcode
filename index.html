<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASP - PENAL CODE</title>
    <style>
        :root {
            --bg: #0d0d0d; --card: #151515; --accent: #ffcc00;
            --input-bg: #1a1a1a; --text: #e0e0e0; --border: #222;
            --danger: #ff4444; --jail: #4dabf7; --fine: #69db7c;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
        .header-area { padding: 25px 30px 10px 30px; }
        #searchInput { width: 100%; background: var(--input-bg); border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 4px; outline: none; border-left: 4px solid var(--accent); }

        .laws-list { flex: 1; padding: 15px 30px 30px 30px; overflow-y: auto; }
        .law-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 15px; overflow: hidden; }
        .law-header { padding: 15px 20px; border-left: 4px solid var(--accent); background: #111; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .law-title { color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 15px; }
        .law-content { display: none; background: #0c0c0c; }
        .law-card.active .law-content { display: block; }
        
        .sub-row { padding: 15px 20px; border-top: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .row-main { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; gap: 15px; }
        .sub-text { flex: 1; font-size: 13px; color: #ccc; line-height: 1.4; }

        .input-group { display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
        .input-wrapper { display: flex; flex-direction: column; align-items: center; }
        .input-label { font-size: 8px; color: #666; text-transform: uppercase; margin-bottom: 4px; font-weight: bold; }
        .input-box { background: #111; border: 1px solid #333; color: white; padding: 7px; width: 75px; border-radius: 4px; text-align: center; font-size: 12px; }
        .input-box[readonly] { border-color: #2b4d2e; color: var(--fine); background: #0f1a10; cursor: not-allowed; font-weight: bold; }

        .btn-add { background: var(--accent); color: black; border: none; width: 35px; height: 35px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 20px; }

        .red-alert-bar { 
            background: var(--danger); color: white; text-align: center; 
            font-weight: 900; font-size: 10px; padding: 5px; border-radius: 3px; 
            margin-top: 12px; text-transform: uppercase; width: 100%;
        }

        /* PROTOKOL (SIDEBAR) */
        .sidebar { width: 380px; background: #080808; padding: 20px; display: flex; flex-direction: column; border-left: 1px solid var(--border); }
        .case-entries { flex: 1; overflow-y: auto; }
        .case-item { 
            position: relative; background: #111; padding: 15px; border-radius: 8px; 
            margin-bottom: 12px; border: 1px solid #222; font-size: 12px;
        }

        .btn-remove { position: absolute; top: 10px; right: 10px; background: transparent; color: #555; border: none; cursor: pointer; font-size: 22px; line-height: 1; }
        .btn-remove:hover { color: var(--danger); }
        
        .item-title { color: var(--accent); font-weight: bold; display: block; margin-bottom: 3px; text-transform: uppercase; font-size: 13px; }
        .item-desc { color: #aaa; font-size: 11px; line-height: 1.3; display: block; margin-bottom: 8px; }
        .item-alert { background: var(--danger); color: white; text-align: center; font-weight: 800; font-size: 10px; padding: 4px; border-radius: 4px; margin-bottom: 8px; text-transform: uppercase; }
        .item-vals { font-weight: bold; font-size: 13px; border-top: 1px solid #222; padding-top: 8px; }

        .summary-box { background: #111; padding: 20px; border-radius: 8px; border: 1px solid var(--accent); margin-top: 20px; }
        .final-alert { background: rgba(255, 68, 68, 0.15); border: 1px solid var(--danger); border-radius: 6px; padding: 12px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="header-area">
        <h2 style="margin:0 0 15px 0; letter-spacing:2px;">POLICEJNÍ DATABÁZE</h2>
        <input type="text" id="searchInput" placeholder="Vyhledat v paragrafech..." onkeyup="filterLaws()">
    </div>
    <div class="laws-list" id="lawsContainer"></div>
</div>

<div class="sidebar">
    <h2 style="color:var(--accent); text-align:center; margin-bottom:20px; letter-spacing: 4px;">PROTOKOL</h2>
    <div class="case-entries" id="caseEntries"></div>
    <div class="summary-box">
        <div id="licenseAlert" class="final-alert" style="display:none;">
            <div style="color:var(--danger); font-weight:900; font-size:12px; margin-bottom:5px; border-bottom: 1px solid rgba(255,68,68,0.2); padding-bottom:3px;">ODEBRAT Z EVIDENCE:</div>
            <div id="docsList" style="color:#ffcccc; font-size:11px; font-weight:bold;"></div>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:bold;">
            <span>VĚZENÍ:</span> <span id="totalJail" style="color:var(--jail)">0 let</span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold;">
            <span>POKUTA:</span> <span id="totalFine" style="color:var(--fine)">0 $</span>
        </div>
        <button style="width:100%; padding:14px; background:#1a1a1a; color:var(--danger); border:1px solid #333; cursor:pointer; font-weight:bold; text-transform:uppercase;" onclick="location.reload()">Smazat případ</button>
    </div>
</div>

<script>
    let activeCaseItems = [];

    function analyzeLimits(text, unit) {
        const clean = text.replace(/\./g, '').replace(/\s/g, '');
        const regex = new RegExp(`(\\d+)${unit === 'let' ? 'let' : '\\$'}`, 'gi');
        const matches = [...clean.matchAll(regex)].map(m => m[1]);
        const low = text.toLowerCase();
        const isRange = low.includes("od") || low.includes("do") || low.includes("až") || low.includes("sazba") || text.includes("-");

        if (matches.length >= 2 || (matches.length === 1 && isRange)) {
            let label = matches.length >= 2 ? `${matches[0]}-${matches[1]}` : `max ${matches[0]}`;
            return { type: 'range', placeholder: label, value: '' };
        } 
        if (matches.length === 1) return { type: 'fixed', placeholder: '', value: matches[0] };
        return { type: 'empty', placeholder: unit === 'let' ? 'Let' : 'Částka', value: '' };
    }

    async function loadLaws() {
        const container = document.getElementById('lawsContainer');
        const response = await fetch('tresty.html?v=' + Date.now());
        const html = await response.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        
        temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
            const title = item.getAttribute('data-title');
            
            item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                const inner = line.innerHTML;
                const txt = line.innerText;
                const jail = analyzeLimits(txt, 'let');
                const fine = analyzeLimits(txt, '$');

                let cleanText = inner.split("ODEBRAT")[0];
                let alertHtml = "";
                if (inner.includes("ODEBRAT")) {
                    const alerts = inner.match(/ODEBRAT\s+([^<.]+)/gi);
                    if (alerts) alertHtml = alerts.map(a => `<div class="red-alert-bar">${a}</div>`).join("");
                }

                const subRow = document.createElement('div');
                subRow.className = 'sub-row';
                subRow.innerHTML = `
                    <div class="row-main">
                        <div class="sub-text">${cleanText}</div>
                        <div class="input-group">
                            <div class="input-wrapper">
                                <span class="input-label">VĚZENÍ</span>
                                <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" value="${jail.value}" placeholder="${jail.placeholder}" ${jail.type === 'fixed' ? 'readonly' : ''}>
                            </div>
                            <div class="input-wrapper">
                                <span class="input-label">POKUTA</span>
                                <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" value="${fine.value}" placeholder="${fine.placeholder}" ${fine.type === 'fixed' ? 'readonly' : ''}>
                            </div>
                            <button class="btn-add" onclick="addToCase('${title}', '${txt.replace(/'/g,"\\'")}', ${lIdx}, ${rIdx})">+</button>
                        </div>
                    </div>
                    ${alertHtml}`;

                let card = container.querySelector(`[data-law-title="${title}"]`);
                if(!card) {
                    card = document.createElement('div');
                    card.className = 'law-card';
                    card.setAttribute('data-law-title', title);
                    card.innerHTML = `<div class="law-header" onclick="this.parentElement.classList.toggle('active')"><div class="law-title">${title}</div><div>▼</div></div><div class="law-content"></div>`;
                    container.appendChild(card);
                }
                card.querySelector('.law-content').appendChild(subRow);
            });
        });
    }

    function addToCase(title, fullText, lIdx, rIdx) {
        const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
        const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
        
        // Vyčistíme text od "ODEBRAT" pro popis v protokolu
        const desc = fullText.split("ODEBRAT")[0].trim();

        const docs = [];
        if (fullText.toUpperCase().includes("ŘIDIČ")) docs.push("ODEBRAT ŘIDIČSKÉ OPRÁVNĚNÍ");
        if (fullText.toUpperCase().includes("ZBROJNÍ")) docs.push("ODEBRAT ZBROJNÍ PRŮKAZ");

        activeCaseItems.push({ id: Date.now(), title, desc, jail: j, fine: f, docs });
        renderCase();
    }

    function renderCase() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = "";
        let jTot = 0, fTot = 0, allDocs = new Set();

        activeCaseItems.forEach(item => {
            jTot += item.jail; fTot += item.fine;
            item.docs.forEach(d => allDocs.add(d.replace("ODEBRAT ", "")));
            
            const div = document.createElement('div');
            div.className = 'case-item';
            div.innerHTML = `
                <button class="btn-remove" onclick="removeEntry(${item.id})">×</button>
                <span class="item-title">${item.title}</span>
                <span class="item-desc">${item.desc}</span>
                ${item.docs.map(d => `<div class="item-alert">${d}</div>`).join("")}
                <div class="item-vals">
                    <span style="color:var(--jail)">${item.jail} let</span> | 
                    <span style="color:var(--fine)">${item.fine.toLocaleString()} $</span>
                </div>`;
            cont.appendChild(div);
        });

        document.getElementById('totalJail').innerText = jTot + " let";
        document.getElementById('totalFine').innerText = fTot.toLocaleString() + " $";
        document.getElementById('licenseAlert').style.display = allDocs.size > 0 ? 'block' : 'none';
        document.getElementById('docsList').innerText = Array.from(allDocs).join(", ");
    }

    function removeEntry(id) {
        activeCaseItems = activeCaseItems.filter(i => i.id !== id);
        renderCase();
    }

    function filterLaws() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.law-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none");
    }

    window.onload = loadLaws;
</script>
</body>
</html>
