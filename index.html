<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASP - Penal Code</title>
    <style>
        :root {
            --bg: #0d0d0d; --card: #151515; --accent: #ffcc00;
            --input-bg: #1a1a1a; --text: #e0e0e0; --border: #222;
            --danger: #ff4444; --jail: #4dabf7; --fine: #69db7c;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
        
        /* KOMPAKTNÍ HEADER */
        .header-area { padding: 15px 25px 5px 25px; }
        #searchInput { width: 100%; background: var(--input-bg); border: 1px solid #333; color: white; padding: 10px 15px; border-radius: 4px; outline: none; border-left: 3px solid var(--accent); font-size: 13px; }

        .laws-list { flex: 1; padding: 10px 25px 25px 25px; overflow-y: auto; }
        .law-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 8px; overflow: hidden; }
        .law-header { padding: 10px 15px; border-left: 3px solid var(--accent); background: #111; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .law-title { color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .law-content { display: none; background: #0c0c0c; }
        .law-card.active .law-content { display: block; }
        
        /* KOMPAKTNÍ ŘÁDKY */
        .sub-row { padding: 8px 15px; border-top: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .row-main { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px; }
        .sub-text { flex: 1; font-size: 12px; color: #ccc; line-height: 1.2; }

        .input-group { display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
        .input-wrapper { display: flex; flex-direction: column; align-items: center; }
        .input-label { font-size: 7px; color: #555; text-transform: uppercase; margin-bottom: 2px; font-weight: bold; }
        .input-box { background: #111; border: 1px solid #333; color: white; padding: 5px; width: 65px; border-radius: 3px; text-align: center; font-size: 11px; }
        .input-box[readonly] { border-color: #2b4d2e; color: var(--fine); background: #0f1a10; cursor: not-allowed; }

        .btn-add { background: var(--accent); color: black; border: none; width: 28px; height: 28px; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 16px; }

        .red-alert-bar { 
            background: var(--danger); color: white; text-align: center; 
            font-weight: 900; font-size: 9px; padding: 3px; border-radius: 2px; 
            margin-top: 6px; text-transform: uppercase; width: 100%;
        }

        /* PROTOKOL - UŽŠÍ A ČISTŠÍ */
        .sidebar { width: 320px; background: #080808; padding: 15px; display: flex; flex-direction: column; border-left: 1px solid var(--border); }
        .case-entries { flex: 1; overflow-y: auto; }
        .case-item { position: relative; background: #111; padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #222; }
        .btn-remove { position: absolute; top: 5px; right: 5px; background: transparent; color: #444; border: none; cursor: pointer; font-size: 18px; }
        
        .item-title { color: var(--accent); font-weight: bold; display: block; margin-bottom: 2px; text-transform: uppercase; font-size: 11px; }
        .item-desc { color: #888; font-size: 10px; line-height: 1.2; display: block; margin-bottom: 5px; }
        .item-alert { background: var(--danger); color: white; text-align: center; font-weight: 800; font-size: 9px; padding: 2px; border-radius: 3px; margin-bottom: 5px; text-transform: uppercase; }
        .item-vals { font-weight: bold; font-size: 11px; border-top: 1px solid #222; padding-top: 5px; }

        .summary-box { background: #111; padding: 15px; border-radius: 6px; border: 1px solid var(--accent); margin-top: 15px; }
        .final-alert { background: rgba(255, 68, 68, 0.1); border: 1px solid var(--danger); border-radius: 4px; padding: 8px; margin-bottom: 10px; text-align: center; font-size: 11px; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="header-area">
        <h2 style="margin:0 0 10px 0; letter-spacing:1px; font-size: 16px;">POLICEJNÍ DATABÁZE - PENAL CODE - GenK</h2>
        <input type="text" id="searchInput" placeholder="Hledat..." onkeyup="filterLaws()">
    </div>
    <div class="laws-list" id="lawsContainer"></div>
</div>

<div class="sidebar">
    <h3 style="color:var(--accent); text-align:center; margin-top:0; margin-bottom:15px; font-size: 14px; letter-spacing: 2px;">PROTOKOL</h3>
    <div class="case-entries" id="caseEntries"></div>
    <div class="summary-box">
        <div id="licenseAlert" class="final-alert" style="display:none;">
            <div style="color:var(--danger); font-weight:900; margin-bottom:2px;">ODEBRAT:</div>
            <div id="docsList" style="color:#ffcccc;"></div>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size: 12px; font-weight:bold;">
            <span>VĚZENÍ:</span> <span id="totalJail" style="color:var(--jail)">0 let</span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size: 12px; font-weight:bold;">
            <span>POKUTA:</span> <span id="totalFine" style="color:var(--fine)">0 $</span>
        </div>
        <button style="width:100%; padding:10px; background:#1a1a1a; color:var(--danger); border:1px solid #333; cursor:pointer; font-weight:bold; font-size:11px;" onclick="location.reload()">VYMAZAT PŘÍPAD</button>
    </div>
</div>

<script>
    let activeCaseItems = [];

    function analyzeLimits(text, unit) {
        const clean = text.replace(/\./g, '').replace(/\s/g, '');
        const regex = new RegExp(`(\\d+)${unit === 'let' ? 'let' : '\\$'}`, 'gi');
        const matches = [...clean.matchAll(regex)].map(m => m[1]);
        const low = text.toLowerCase();
        const isRange = low.includes("od") || low.includes("do") || low.includes("až") || text.includes("-");

        if (matches.length >= 2 || (matches.length === 1 && isRange)) {
            let label = matches.length >= 2 ? `${matches[0]}-${matches[1]}` : `max ${matches[0]}`;
            return { type: 'range', placeholder: label, value: '' };
        } 
        if (matches.length === 1) return { type: 'fixed', placeholder: '', value: matches[0] };
        return { type: 'empty', placeholder: unit === 'let' ? 'Let' : 'Suma', value: '' };
    }

    async function loadLaws() {
        const container = document.getElementById('lawsContainer');
        const response = await fetch('tresty.html?v=' + Date.now());
        const html = await response.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        
        temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
            const title = item.getAttribute('data-title');
            let contentHtml = "";

            item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                const inner = line.innerHTML;
                const txt = line.innerText;
                const jail = analyzeLimits(txt, 'let');
                const fine = analyzeLimits(txt, '$');
                let cleanText = inner.split("ODEBRAT")[0];
                let alerts = inner.includes("ODEBRAT") ? inner.match(/ODEBRAT\s+([^<.]+)/gi) : null;

                contentHtml += `
                    <div class="sub-row">
                        <div class="row-main">
                            <div class="sub-text">${cleanText}</div>
                            <div class="input-group">
                                <div class="input-wrapper"><span class="input-label">LET</span><input type="number" class="input-box" id="j_${lIdx}_${rIdx}" value="${jail.value}" placeholder="${jail.placeholder}" ${jail.type === 'fixed' ? 'readonly' : ''}></div>
                                <div class="input-wrapper"><span class="input-label">SUMA</span><input type="number" class="input-box" id="f_${lIdx}_${rIdx}" value="${fine.value}" placeholder="${fine.placeholder}" ${fine.type === 'fixed' ? 'readonly' : ''}></div>
                                <button class="btn-add" onclick="addToCase('${title}', '${txt.replace(/'/g,"\\'")}', ${lIdx}, ${rIdx})">+</button>
                            </div>
                        </div>
                        ${alerts ? alerts.map(a => `<div class="red-alert-bar">${a}</div>`).join("") : ""}
                    </div>`;
            });

            const card = document.createElement('div');
            card.className = 'law-card';
            card.innerHTML = `<div class="law-header" onclick="this.parentElement.classList.toggle('active')"><div class="law-title">${title}</div><div>▼</div></div><div class="law-content">${contentHtml}</div>`;
            container.appendChild(card);
        });
    }

    function addToCase(title, fullText, lIdx, rIdx) {
        const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
        const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
        const desc = fullText.split("ODEBRAT")[0].trim();
        const docs = [];
        if (fullText.toUpperCase().includes("ŘIDIČ")) docs.push("ODEBRAT ŘIDIČSKÝ PRŮKAZ");
        if (fullText.toUpperCase().includes("ZBROJNÍ")) docs.push("ODEBRAT ZBROJNÍ PRŮKAZ");

        activeCaseItems.push({ id: Date.now(), title, desc, jail: j, fine: f, docs });
        renderCase();
    }

    function renderCase() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = "";
        let jTot = 0, fTot = 0, allDocs = new Set();

        activeCaseItems.forEach(item => {
            jTot += item.jail; fTot += item.fine;
            item.docs.forEach(d => allDocs.add(d.replace("ODEBRAT ", "")));
            const div = document.createElement('div');
            div.className = 'case-item';
            div.innerHTML = `<button class="btn-remove" onclick="removeEntry(${item.id})">×</button>
                <span class="item-title">${item.title}</span><span class="item-desc">${item.desc}</span>
                ${item.docs.map(d => `<div class="item-alert">${d}</div>`).join("")}
                <div class="item-vals"><span style="color:var(--jail)">${item.jail} let</span> | <span style="color:var(--fine)">${item.fine.toLocaleString()} $</span></div>`;
            cont.appendChild(div);
        });

        document.getElementById('totalJail').innerText = jTot + " let";
        document.getElementById('totalFine').innerText = fTot.toLocaleString() + " $";
        document.getElementById('licenseAlert').style.display = allDocs.size > 0 ? 'block' : 'none';
        document.getElementById('docsList').innerText = Array.from(allDocs).join(", ");
    }

    function removeEntry(id) { activeCaseItems = activeCaseItems.filter(i => i.id !== id); renderCase(); }
    function filterLaws() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.law-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none");
    }
    window.onload = loadLaws;
</script>
</body>
</html>
