<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - Penal Code System</title>
    <style>
        :root {
            --bg-main: #0a0b0d; --bg-panel: #111317;
            --accent: #ffcc00; --danger: #ff4444;
            --info: #00aaff; --fine: #00ff88; --border: #202124;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg-main); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* PŘIHLAŠOVACÍ OBRAZOVKA */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 200000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #111317; padding: 60px 40px; border-radius: 20px; text-align: center; width: 450px; border: 2px solid rgba(255, 204, 0, 0.1); animation: borderPulse 3s infinite ease-in-out; }
        @keyframes borderPulse { 0%, 100% { border-color: rgba(255, 204, 0, 0.1); } 50% { border-color: rgba(255, 204, 0, 0.6); } }
        .login-btn { background: var(--accent); color: #000; border: none; padding: 18px 40px; font-weight: 900; cursor: pointer; border-radius: 5px; font-size: 16px; text-transform: uppercase; width: 100%; }

        /* MODÁL PRO CHYBY */
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: #1a0000; border: 4px solid var(--danger); padding: 40px; border-radius: 15px; text-align: center; width: 500px; animation: pulse-alert 1s infinite; }
        @keyframes pulse-alert { 0%, 100% { box-shadow: 0 0 20px var(--danger); } 50% { box-shadow: 0 0 40px var(--danger); } }

        /* APLIKACE */
        #mainApp { display: none; height: 100vh; width: 100%; }
        #leftPanel { flex: 3; border-right: 2px solid var(--border); display: flex; flex-direction: column; }
        #rightPanel { flex: 1.2; min-width: 400px; background: var(--bg-panel); display: flex; flex-direction: column; }
        
        .law-description { flex: 1; font-size: 16px; color: #ddd; line-height: 1.5; }
        .law-description b, .law-description strong { color: var(--accent) !important; font-weight: 900 !important; }

        .input-box { background: #000 !important; border: 1px solid #333; color: var(--accent) !important; font-weight: 900; padding: 8px 5px; width: 80px; text-align: center; border-radius: 4px; font-size: 14px; outline: none; }
        .row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1a1c20; }
        .protocol-card { background: #000; border: 1px solid var(--border); margin: 10px; padding: 15px; border-radius: 8px; position: relative; }
        .warning-bar { color: white; padding: 15px; font-weight: 900; text-align: center; margin: 5px 10px; display: none; border-radius: 4px; font-size: 14px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h1 style="color:var(--accent); font-size: 32px; margin-bottom: 5px; letter-spacing: 2px;">SASP TERMINÁL</h1>
        <p style="color:#555; font-size: 12px; letter-spacing: 3px; margin-bottom: 40px;">SECURE ACCESS GATEWAY</p>
        <button class="login-btn" onclick="login()">VSTOUPIT DO EVIDENCE</button>
        <div style="color:#333; font-size:10px; margin-top:40px;">© 2026 SASP Nathaniel Hartman</div>
    </div>
</div>

<div id="modalOverlay">
    <div class="modal-box">
        <h1 style="color:var(--danger); font-size: 50px; margin:0;">⚠️</h1>
        <h2 style="color:#fff; margin-bottom: 10px;">NEDOVOLENÝ TREST</h2>
        <p id="modalMsg" style="color:#ccc; font-size: 18px; margin-bottom: 30px;"></p>
        <button onclick="closeModal()" style="background:var(--danger); color:white; border:none; padding:15px 30px; font-weight:900; cursor:pointer; border-radius:5px;">OPRAVIT</button>
    </div>
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div style="padding:20px; border-bottom:2px solid var(--border); background: #16181d;">
            <input type="text" id="searchInput" placeholder="Vyhledat v zákoníku..." oninput="render()" style="width:100%; background:#000; border:1px solid #444; color:#fff; padding:12px; border-radius: 5px;">
        </div>
        <div id="lawsContainer" style="overflow-y:auto; padding:20px;"></div>
    </div>

    <div id="rightPanel">
        <div style="padding:15px; background:#000; font-size:11px; color:#444; border-bottom:1px solid var(--border);">SASP DIGITAL EVIDENCE SYSTEM</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto;"></div>
        
        <div id="warnWeapon" class="warning-bar" style="background:var(--danger);">⚠️ ODEBRAT ZBROJNÍ PRŮKAZ</div>
        <div id="warnDriver" class="warning-bar" style="background:#ff6600;">⚠️ ODEBRAT ŘIDIČSKÝ PRŮKAZ</div>
        
        <div style="padding:25px; background:#000; border-top:2px solid var(--border);">
            <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:20px; font-size: 20px;">
                <span>CELKEM:</span>
                <span><span id="sumJail" style="color:var(--info)">0</span> 皿 Věžení | <span id="sumFine" style="color:var(--fine)">0</span> $ Pokuta </span>
            </div>
            <button onclick="resetCase()" style="width:100%; padding:18px; background:var(--info); color:white; border:none; font-weight:900; cursor:pointer; border-radius:5px;">NOVÝ PŘÍPAD / RESET</button>
        </div>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];

    function login() { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('mainApp').style.display = 'flex'; load(); }
    function showModal(msg) { document.getElementById('modalMsg').innerText = msg; document.getElementById('modalOverlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    
    function resetCase() {
        protocol = [];
        updateProtocol();
        document.querySelectorAll('.input-box').forEach(i => { if(!i.disabled) i.value = ''; });
    }

    function parseDualLimits(text) {
        const cleanText = text.replace(/\./g, '').toLowerCase();
        let limits = { jail: { min: 0, max: 0 }, fine: { max: 0 } };

        // 1. Detekce vězení (rozmezí)
        const jailRange = cleanText.match(/(\d+)\s*[-–至až]\s*(\d+)\s*let/);
        const jailFromTo = cleanText.match(/od\s+(\d+)\s+.*do\s+(\d+)\s+let/);
        
        if (jailRange) {
            limits.jail.min = parseInt(jailRange[1]);
            limits.jail.max = parseInt(jailRange[2]);
        } else if (jailFromTo) {
            limits.jail.min = parseInt(jailFromTo[1]);
            limits.jail.max = parseInt(jailFromTo[2]);
        }

        // 2. Detekce pokuty
        const fineMatch = cleanText.match(/(?:trest|pokut).*?(\d+)\s*\$/);
        if (fineMatch) {
            limits.fine.max = parseInt(fineMatch[1]);
        }

        return limits;
    }

    async function load() {
        try {
            const res = await fetch('tresty.html?v=' + Date.now());
            const html = await res.text();
            const doc = new DOMParser().parseFromString(html, 'text/html');
            laws = Array.from(doc.querySelectorAll('.law-item')).map(item => ({
                title: item.getAttribute('data-title'),
                subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                    const text = line.innerText;
                    const fixJ = line.getAttribute('data-fix-jail');
                    const fixF = line.getAttribute('data-fix-fine');
                    return {
                        html: line.innerHTML, fullText: text,
                        valJ: fixJ || "", valF: fixF || "",
                        isFixJ: fixJ !== null, isFixF: fixF !== null,
                        limits: parseDualLimits(text),
                        licW: text.toUpperCase().includes("ZBROJNÍ"), 
                        licD: text.toUpperCase().includes("ŘIDIČSKÝ")
                    };
                })
            }));
            render();
        } catch (e) { console.error(e); }
    }

    function render() {
        const container = document.getElementById('lawsContainer');
        const search = document.getElementById('searchInput').value.toLowerCase();
        container.innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div style="background:var(--bg-panel); border:1px solid var(--border); margin-bottom:12px; border-radius:8px; overflow:hidden;">
                <div style="padding:15px; background:#1c1f24; color:var(--accent); font-weight:900; cursor:pointer;" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">${law.title}</div>
                <div style="padding:15px; display:none;">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div class="law-description">${sub.html}</div>
                            <input type="number" class="input-box" id="j_${lIdx}_${sIdx}" value="${sub.valJ}" placeholder="JAIL" ${sub.isFixJ?'disabled':''}>
                            <input type="number" class="input-box" id="f_${lIdx}_${sIdx}" value="${sub.valF}" placeholder="FINE" ${sub.isFixF?'disabled':''}>
                            <button onclick="add(${lIdx}, ${sIdx})" style="background:var(--accent); border:none; padding:10px 15px; border-radius:4px; font-weight:900; cursor:pointer;">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        const jail = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        const fine = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;

        if (jail <= 0 && fine <= 0) { showModal("Trest nesmí být nulový!"); return; }
        
        // KONTROLA VĚZENÍ
        if (jail > 0 && !sub.isFixJ && sub.limits.jail.max > 0) {
            if (jail < sub.limits.jail.min || jail > sub.limits.jail.max) {
                showModal(`Nelegální délka vězení! Sazba je ${sub.limits.jail.min} až ${sub.limits.jail.max} let.`);
                return;
            }
        }

        // KONTROLA POKUTY
        if (fine > 0 && !sub.isFixF && sub.limits.fine.max > 0) {
            if (fine > sub.limits.fine.max) {
                showModal(`Nelegální výše pokuty! Maximální povolená částka je $${sub.limits.fine.max.toLocaleString()}.`);
                return;
            }
        }

        protocol.push({ id: Date.now(), title: laws[lIdx].title, fullText: sub.fullText, jail, fine, licW: sub.licW, licD: sub.licD });
        updateProtocol();
    }

    function updateProtocol() {
        const list = document.getElementById('caseEntries');
        list.innerHTML = protocol.map((p) => `
            <div class="protocol-card">
                <div style="color:var(--accent); font-weight:900; font-size:14px;">${p.title}</div>
                <div style="font-size:11px; color:#777; margin-top:4px; font-style:italic;">${p.fullText}</div>
                <div style="margin-top:10px; font-weight:900; font-size:20px; color:var(--accent);">${p.jail > 0 ? p.jail+' J' : ''} ${p.fine > 0 ? ' $'+p.fine.toLocaleString() : ''}</div>
                <button onclick="remove(${p.id})" style="position:absolute; right:15px; top:15px; background:none; border:none; color:var(--danger); cursor:pointer; font-size:20px;">✕</button>
            </div>
        `).join('');
        document.getElementById('warnWeapon').style.display = protocol.some(p => p.licW) ? 'block' : 'none';
        document.getElementById('warnDriver').style.display = protocol.some(p => p.licD) ? 'block' : 'none';
        document.getElementById('sumJail').innerText = protocol.reduce((a, b) => a + b.jail, 0);
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    function remove(id) { protocol = protocol.filter(x => x.id !== id); updateProtocol(); }
</script>
</body>
</html>
