<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASP - Penal Code</title>
    <style>
        :root {
            --bg: #000000;
            --card: #0c0c0c;
            --accent: #ffcc00;
            --border: #1a1a1a;
            --jail: #00aaff;
            --fine: #00ff88;
            --danger: #ff4444;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* LEVÝ PANEL - ZÁKONY */
        #leftPanel {
            flex: 2;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
            overflow-y: auto;
        }

        #searchInput {
            background: #111;
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            font-size: 15px;
            outline: none;
            border-radius: 4px;
        }

        .law-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            padding: 15px;
            cursor: pointer;
            border-radius: 4px;
        }

        .law-title { color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .law-desc { color: #555; font-size: 11px; margin-top: 5px; }
        
        .law-content { display: none; margin-top: 15px; border-top: 1px solid #1a1a1a; padding-top: 10px; }
        .law-card.active .law-content { display: block; }

        .sub-row { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #111; }
        .sub-text { font-size: 13px; color: #ccc; margin-bottom: 8px; }

        .input-group { display: flex; gap: 8px; align-items: center; }
        .input-box { background: #000; border: 1px solid #333; color: #fff; padding: 6px; width: 65px; text-align: center; border-radius: 3px; }
        .btn-add { background: var(--accent); border: none; padding: 6px 15px; font-weight: bold; cursor: pointer; border-radius: 3px; }

        /* PRAVÝ PANEL - PROTOKOL */
        #rightPanel {
            flex: 1;
            background: var(--card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .protocol-title { color: var(--accent); font-weight: bold; border-bottom: 1px solid var(--accent); padding-bottom: 10px; margin-bottom: 15px; }
        
        #caseEntries { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        
        .case-item {
            background: #111;
            border: 1px solid #222;
            border-left: 3px solid var(--accent);
            padding: 10px;
            margin-bottom: 10px;
            position: relative;
        }

        .item-vals { display: flex; justify-content: space-between; margin-top: 10px; font-weight: bold; font-size: 14px; }
        .item-alert { color: var(--danger); font-size: 10px; font-weight: bold; margin-top: 5px; display: block; }

        /* SOUHRN DOLE */
        .summary-box { border-top: 2px solid var(--accent); padding-top: 15px; margin-top: 10px; }
        .summary-line { display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; margin-bottom: 10px; }
        
        .btn-clear { width: 100%; background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-clear:hover { background: var(--danger); color: #000; }
        
        .btn-remove { position: absolute; right: 5px; top: 5px; color: #444; background: none; border: none; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div id="leftPanel">
    <input type="text" id="searchInput" placeholder="Vyhledat paragraf..." oninput="doSearch()">
    <div id="lawsContainer">Načítám trestní zákoník...</div>
</div>

<div id="rightPanel">
    <div class="protocol-title">AKTIVNÍ PROTOKOL</div>
    <div id="caseEntries"></div>
    
    <div class="summary-box">
        <div class="summary-line">Vězení: <span id="sumJail" style="color:var(--jail)">0 let</span></div>
        <div class="summary-line">Pokuta: <span id="sumFine" style="color:var(--fine)">0 $</span></div>
        <div id="globalAlert" style="display:none; color:var(--danger); font-size:12px; font-weight:bold; margin-bottom:10px;">
            ⚠ ZABAVIT: <span id="alertList"></span>
        </div>
        <button class="btn-clear" onclick="clearAll()">VYMAZAT PŘÍPAD</button>
    </div>
</div>

<script>
    let protocolData = [];

    // 1. Načtení dat
    async function init() {
        const container = document.getElementById('lawsContainer');
        try {
            const res = await fetch('tresty.html?v=' + Date.now());
            const html = await res.text();
            const temp = document.createElement('div');
            temp.innerHTML = html;
            
            container.innerHTML = "";
            temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
                const title = item.getAttribute('data-title') || "Paragraf";
                const desc = item.querySelector('.law-description')?.innerText || "";
                let rows = "";

                item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                    const fF = line.getAttribute('data-fix-fine');
                    const fJ = line.getAttribute('data-fix-jail');
                    
                    rows += `
                        <div class="sub-row">
                            <div class="sub-text">${line.innerHTML}</div>
                            <div class="input-group">
                                <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" value="${fJ || ''}" placeholder="Let" ${fJ ? 'readonly' : ''}>
                                <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" value="${fF || ''}" placeholder="Suma" ${fF ? 'readonly' : ''}>
                                <button class="btn-add" onclick="event.stopPropagation(); addItem('${title}', '${line.innerText.replace(/'/g,"")}', ${lIdx}, ${rIdx})">+</button>
                            </div>
                        </div>`;
                });

                const card = document.createElement('div');
                card.className = 'law-card';
                card.onclick = function() { this.classList.toggle('active'); };
                card.innerHTML = `<div class="law-title">${title}</div><div class="law-desc">${desc}</div><div class="law-content">${rows}</div>`;
                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = "Chyba: Soubor tresty.html nebyl nalezen.";
        }
    }

    // 2. Vyhledávání
    function doSearch() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.law-card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(val) ? "block" : "none";
        });
    }

    // 3. Přidání do protokolu
    function addItem(title, text, lIdx, rIdx) {
        const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
        const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
        
        let docs = [];
        if (text.includes("Zbrojní")) docs.push("ZBROJNÍ PRŮKAZ");
        if (text.includes("Řidičský")) docs.push("ŘIDIČSKÝ PRŮKAZ");

        const variant = text.includes(')') ? text.split(')')[0] + ")" : "Bod";
        
        protocolData.push({ title, variant, jail: j, fine: f, docs });
        render();
    }

    // 4. Vykreslení
    function render() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = "";
        let tj = 0, tf = 0, ds = new Set();

        protocolData.forEach((i, idx) => {
            tj += i.jail; tf += i.fine;
            i.docs.forEach(d => ds.add(d));

            cont.innerHTML += `
                <div class="case-item">
                    <button class="btn-remove" onclick="remove(${idx})">×</button>
                    <div style="color:var(--accent); font-size:12px; font-weight:bold;">${i.title}</div>
                    <div style="color:#666; font-size:10px;">${i.variant}</div>
                    ${i.docs.map(d => `<span class="item-alert">⚠ ODEBRAT ${d}</span>`).join("")}
                    <div class="item-vals">
                        <span style="color:var(--jail)">${i.jail} let</span>
                        <span style="color:var(--fine)">${i.fine.toLocaleString()} $</span>
                    </div>
                </div>`;
        });

        document.getElementById('sumJail').innerText = tj + " let";
        document.getElementById('sumFine').innerText = tf.toLocaleString() + " $";
        
        const gAlert = document.getElementById('globalAlert');
        if (ds.size > 0) {
            gAlert.style.display = "block";
            document.getElementById('alertList').innerText = Array.from(ds).join(", ");
        } else {
            gAlert.style.display = "none";
        }
    }

    function remove(idx) { protocolData.splice(idx, 1); render(); }
    function clearAll() { if(confirm("Smazat celý případ?")) { protocolData = []; render(); } }

    window.onload = init;
</script>

</body>
</html>
