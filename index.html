<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL v95</title>
    <style>
        :root {
            --bg-main: #0a0b0d; --bg-panel: #14161a;
            --accent: #ffcc00; --danger: #ff4444;
            --jail: #00aaff; --fine: #00ff88; --border: #202124;
        }

        body { background: var(--bg-main); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #lawsContainer b, #lawsContainer strong { color: var(--accent) !important; font-weight: bold; }

        #leftPanel { flex: 3; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #rightPanel { flex: 1.2; min-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; }

        .header-bar { padding: 20px; background: var(--bg-panel); border-bottom: 1px solid var(--border); }
        #lawsContainer { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .law-card { background: var(--bg-panel); border: 1px solid var(--border); margin-bottom: 10px; border-radius: 6px; }
        .law-header { padding: 15px; cursor: pointer; color: var(--accent); font-weight: 800; display: flex; justify-content: space-between; }
        .law-content { display: none; padding: 10px 20px; background: #0f1114; }
        .law-card.active .law-content { display: block; }
        .row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #1a1c20; }

        .input-box { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; width: 85px; text-align: center; border-radius: 4px; font-weight: bold; outline: none; }
        
        .input-box:disabled, .input-box[readonly] { 
            border-color: var(--danger) !important; 
            color: var(--danger) !important;
            background: rgba(255, 68, 68, 0.05) !important;
            cursor: not-allowed;
            opacity: 1;
        }

        .protocol-item { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid var(--jail); margin: 10px; position: relative; border: 1px solid var(--border); }
        .proto-inputs { display: flex; gap: 15px; margin-top: 10px; }
        
        .lic-alert-item {
            color: var(--danger); background: rgba(255, 68, 68, 0.1); border: 1px solid var(--danger);
            padding: 5px; border-radius: 4px; font-size: 11px; font-weight: 900; margin-top: 10px;
            text-align: center; text-transform: uppercase;
        }

        #licenseWarning {
            background: var(--danger); color: white; padding: 12px; border-radius: 4px; font-weight: 900;
            text-align: center; margin: 10px; display: none;
            animation: pulse-red 0.8s infinite alternate; font-size: 14px;
        }

        @keyframes pulse-red { from { opacity: 1; transform: scale(1); } to { opacity: 0.7; transform: scale(1.02); } }

        #customAlert {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.95); color: white; padding: 40px 80px;
            border-radius: 15px; font-size: 24px; font-weight: 900; z-index: 10000;
            display: none; text-align: center; border: 4px solid white;
        }

        .summary-box { padding: 20px; background: #000; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="customAlert">⚠️ CHYBA!</div>

<div id="leftPanel">
    <div class="header-bar">
        <h2 style="margin:0; color:var(--accent);">TRESTNÍ ZÁKONÍK</h2>
        <input type="text" id="searchInput" placeholder="Hledat..." oninput="render()" style="width:100%; margin-top:15px; background:#000; border:1px solid var(--border); color:#fff; padding:12px; border-radius:4px;">
    </div>
    <div id="lawsContainer"></div>
</div>

<div id="rightPanel">
    <div style="padding:20px; font-weight:800; color:var(--accent); border-bottom:1px solid var(--border);">AKTIVNÍ PROTOKOL PŘÍPADU</div>
    <div id="caseEntries" style="flex-grow:1; overflow-y:auto;"></div>
    
    <div id="licenseWarning">⚠️ ODEBRAT ZBROJNÍ PRŮKAZ ⚠️</div>
    
    <div class="summary-box">
        <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:15px; font-size: 18px;">
            <span>CELKEM:</span>
            <span><span id="sumJail" style="color:var(--jail)">0</span> let | <span id="sumFine" style="color:var(--fine)">0</span> $</span>
        </div>
        <button onclick="save()" style="width:100%; padding:15px; background:var(--jail); color:white; border:none; border-radius:4px; font-weight:900; cursor:pointer;">ULOŽIT DO DATABÁZE</button>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];

    function showAlert(msg) {
        const el = document.getElementById('customAlert');
        el.innerText = "⚠️ " + msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    async function load() {
        try {
            const res = await fetch('tresty.html?v=' + Date.now());
            const html = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            laws = Array.from(doc.querySelectorAll('.law-item')).map(item => ({
                title: item.getAttribute('data-title'),
                subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                    const text = line.innerText;
                    const fixJ = line.getAttribute('data-fix-jail');
                    const fixF = line.getAttribute('data-fix-fine');
                    
                    // --- LOGIKA PRO ROZMEZÍ ---
                    let minJ = 0, maxJ = 999;
                    let minF = 0, maxF = 0;

                    // Detekce Let (např. "10-20 let", "od 5 let do 15 let")
                    const jailMatch = text.match(/(?:sazba|od|do|až|v rozmezí)\s*([\d\s-]+)\s*let/gi);
                    if (jailMatch) {
                        const nums = jailMatch.join(' ').match(/\d+/g).map(Number);
                        if (nums.length >= 2) { minJ = nums[0]; maxJ = nums[1]; } 
                        else if (nums.length === 1) { maxJ = nums[0]; }
                    }
                    
                    // Detekce Pokuty (např. "5.000 $ - 15.000 $", "do 5.000 $")
                    const fineMatch = text.match(/(?:pokutou|výši|od|do|až|v rozmezí)\s*([\d.\s-]+)\s*\$/gi);
                    if (fineMatch) {
                        const nums = fineMatch.join(' ').replace(/\./g, '').match(/\d+/g).map(Number);
                        if (nums.length >= 2) { minF = nums[0]; maxF = nums[1]; } 
                        else if (nums.length === 1) { maxF = nums[0]; }
                    }

                    return {
                        html: line.innerHTML,
                        fullText: text,
                        letter: (text.match(/^[a-z]\)/i) || [""])[0],
                        valJ: fixJ || "",
                        valF: fixF || "",
                        isFixJ: fixJ !== null,
                        isFixF: fixF !== null,
                        minJ, maxJ, minF, maxF,
                        lic: text.includes("ODEBRAT")
                    };
                })
            }));
            render();
        } catch (e) { console.error(e); }
    }

    function render() {
        const container = document.getElementById('lawsContainer');
        const search = document.getElementById('searchInput').value.toLowerCase();
        container.innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div class="law-card">
                <div class="law-header" onclick="this.parentElement.classList.toggle('active')">
                    <span>${law.title}</span><span>▼</span>
                </div>
                <div class="law-content">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div style="flex:1; font-size:12px;">${sub.html}</div>
                            <input type="number" class="input-box" id="j_${lIdx}_${sIdx}" value="${sub.valJ}" placeholder="Let" ${sub.isFixJ ? 'disabled value="Blokován"' : ''}>
                            <input type="number" class="input-box" id="f_${lIdx}_${sIdx}" value="${sub.valF}" placeholder="$" ${sub.isFixF ? 'disabled value="Blokován"' : ''}>
                            <button onclick="add(${lIdx}, ${sIdx})" style="background:var(--accent); border:none; padding:8px 12px; border-radius:4px; font-weight:900; cursor:pointer;">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        let jail = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        let fine = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;

        // Kontrola rozmezí Let
        if (!sub.isFixJ) {
            if (jail < sub.minJ) { showAlert(`MINIMUM JE ${sub.minJ} LET!`); return; }
            if (jail > sub.maxJ) { showAlert(`MAXIMUM JE ${sub.maxJ} LET!`); return; }
        }

        // Kontrola rozmezí Pokuty
        if (!sub.isFixF && sub.maxF > 0) {
            if (fine < sub.minF) { showAlert(`MINIMUM JE $${sub.minF.toLocaleString()}!`); return; }
            if (fine > sub.maxF) { showAlert(`MAXIMUM JE $${sub.maxF.toLocaleString()}!`); return; }
        }

        protocol.push({
            id: Date.now(),
            title: laws[lIdx].title,
            letter: sub.letter,
            fullText: sub.fullText,
            jail, fine,
            minJ: sub.minJ, maxJ: sub.maxJ,
            minF: sub.minF, maxF: sub.maxF,
            isFixJ: sub.isFixJ, isFixF: sub.isFixF,
            lic: sub.lic
        });
        updateProtocol();
    }

    function updateProtocol() {
        const list = document.getElementById('caseEntries');
        list.innerHTML = protocol.map((p, idx) => `
            <div class="protocol-item">
                <div style="color:var(--accent); font-weight:900; font-size:13px; margin-bottom: 5px;">${p.title} ${p.letter}</div>
                <div style="font-size: 11px; color: #bbb; margin-bottom: 10px; line-height: 1.4;">${p.fullText}</div>
                <div class="proto-inputs">
                    <div>
                        <span style="font-size:10px; color:var(--jail)">LET</span><br>
                        <input type="number" class="input-box" value="${p.jail}" 
                            ${p.isFixJ ? 'readonly' : ''} onchange="edit(${idx}, 'jail', this.value)">
                    </div>
                    <div>
                        <span style="font-size:10px; color:var(--fine)">POKUTA</span><br>
                        <input type="number" class="input-box" value="${p.fine}" 
                            ${p.isFixF ? 'readonly' : ''} onchange="edit(${idx}, 'fine', this.value)">
                    </div>
                </div>
                ${p.lic ? '<div class="lic-alert-item">⚠ ODEBRAT ZBROJNÍ PRŮKAZ</div>' : ''}
                <button onclick="remove(${p.id})" style="position:absolute; right:12px; top:12px; background:none; border:none; color:var(--danger); cursor:pointer; font-size:18px; font-weight:bold;">✕</button>
            </div>
        `).join('');

        document.getElementById('licenseWarning').style.display = protocol.some(p => p.lic) ? 'block' : 'none';
        document.getElementById('sumJail').innerText = protocol.reduce((a, b) => a + b.jail, 0);
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    function edit(idx, type, val) {
        let v = parseInt(val) || 0;
        const p = protocol[idx];
        
        if (type === 'jail' && !p.isFixJ) {
            if (v < p.minJ) v = p.minJ;
            if (v > p.maxJ) v = p.maxJ;
        }
        if (type === 'fine' && !p.isFixF && p.maxF > 0) {
            if (v < p.minF) v = p.minF;
            if (v > p.maxF) v = p.maxF;
        }
        
        protocol[idx][type] = v;
        updateProtocol();
    }

    function remove(id) { protocol = protocol.filter(x => x.id !== id); updateProtocol(); }
    function save() { alert("Protokol uložen do databáze."); protocol = []; updateProtocol(); }

    load();
</script>
</body>
</html>
