<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policejní Terminál - Responzivní Verze</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --card: #151515;
            --accent: #ffcc00;
            --input-bg: #1a1a1a;
            --text: #e0e0e0;
            --text-muted: #888;
            --border: #222;
            --danger: #ff4444;
            --jail: #4dabf7;
            --fine: #69db7c;
            --side-padding: 2vw; /* Dynamické odsazení podle šířky okna */
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            margin: 0; height: 100vh; overflow: hidden; 
        }

        /* HLAVNÍ OBSAH - Zabere zbytek místa */
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            border-right: 1px solid var(--border); 
        }

        .header-area { padding: 20px var(--side-padding); }
        .main-title { 
            color: var(--text); font-size: clamp(18px, 2vw, 28px); 
            font-weight: 800; text-transform: uppercase; 
            margin-bottom: 15px; border-bottom: 2px solid var(--accent); 
            display: inline-block; 
        }

        #searchInput {
            width: 100%; background: var(--input-bg); border: 1px solid #333; color: white;
            padding: 12px 15px; border-radius: 4px; outline: none; border-left: 4px solid var(--accent);
            box-sizing: border-box;
        }

        /* SEZNAM ZÁKONŮ */
        .laws-list { flex: 1; padding: 10px var(--side-padding); overflow-y: auto; }
        .law-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 15px; }
        .law-header { padding: 15px; border-left: 4px solid var(--accent); cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #111; }
        .law-title { color: var(--accent); font-weight: bold; font-size: 16px; text-transform: uppercase; }

        .law-content { display: none; background: #0c0c0c; }
        .law-card.active .law-content { display: block; }
        
        .sub-row { display: flex; align-items: flex-start; padding: 12px 15px; border-top: 1px solid #1a1a1a; gap: 10px; }
        .sub-text { flex: 1; font-size: 13px; color: #ccc; line-height: 1.4; }

        /* DODATEK */
        .appendix { margin-top: 6px; padding: 6px 10px; background: rgba(255, 204, 0, 0.05); border-left: 2px solid var(--accent); font-size: 11px; color: #bbb; }

        /* VSTUPY - Responzivní šířka */
        .input-group { display: flex; gap: 8px; align-items: flex-end; }
        .input-wrapper { display: flex; flex-direction: column; align-items: center; }
        .input-label { font-size: 8px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
        .input-box { background: #111; border: 1px solid #333; color: white; padding: 6px; width: 65px; border-radius: 4px; text-align: center; font-size: 12px; }
        
        .btn-add { background: var(--accent); color: black; border: none; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* SIDEBAR - Adaptivní šířka */
        .sidebar { 
            width: 25%; /* Procentuální šířka místo pevné */
            min-width: 280px; 
            max-width: 400px;
            background: #080808; padding: 20px; display: flex; flex-direction: column; 
        }
        
        .protocol-title { color: var(--accent); text-align: center; font-size: 1.5rem; margin-bottom: 15px; letter-spacing: 2px; }
        .case-entries { flex: 1; overflow-y: auto; }
        .case-item { background: #111; padding: 12px; border-radius: 4px; margin-bottom: 10px; border-left: 3px solid var(--accent); font-size: 12px; }
        
        .summary-box { background: #0f0f0f; padding: 15px; border-radius: 6px; border: 1px solid #222; margin-top: 15px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        
        /* MEDIA QUERIES - Pro velmi malé obrazovky */
        @media (max-width: 1000px) {
            .sub-row { flex-wrap: wrap; }
            .input-group { width: 100%; justify-content: flex-end; margin-top: 10px; }
            .sidebar { width: 300px; }
        }

        .alert-red { color: white; background: var(--danger); padding: 2px 6px; border-radius: 3px; font-weight: bold; text-transform: uppercase; font-size: 9px; display: inline-block; margin-top: 4px; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="header-area">
        <div class="main-title">Policejní Databáze</div>
        <input type="text" id="searchInput" placeholder="Vyhledat..." onkeyup="filterLaws()">
    </div>
    <div class="laws-list" id="lawsContainer"></div>
</div>

<div class="sidebar">
    <h1 class="protocol-title">PROTOKOL</h1>
    <div class="case-entries" id="caseEntries"></div>
    <div class="summary-box">
        <div id="licenseAlert" style="display:none; margin-bottom:10px; border:1px solid var(--danger); padding:8px; font-size:11px;">
            <b style="color:var(--danger)">ODEBRAT:</b> <span id="docsList"></span>
        </div>
        <div class="summary-row"><span>VĚZENÍ:</span> <span id="totalJail" style="color: var(--jail);">0 let</span></div>
        <div class="summary-row"><span>POKUTA:</span> <span id="totalFine" style="color: var(--fine);">0 $</span></div>
        <button onclick="location.reload()" style="width:100%; background:#1a1a1a; color:var(--danger); border:1px solid #333; padding:10px; cursor:pointer; font-weight:bold; text-transform:uppercase; font-size:12px;">Nový případ</button>
    </div>
</div>

<script>
    let jailTotal = 0, fineTotal = 0;
    let docsToRevoke = new Set();

    // Dynamická detekce limitů z textu
    function extractLimits(text, unit) {
        const regex = new RegExp(`(\\d+[.\\d]*)\\s*${unit.replace('$', '\\$')}`, 'g');
        const matches = [...text.matchAll(regex)].map(m => m[1]);
        if (matches.length >= 2) return `${matches[0]}-${matches[1]}`;
        if (matches.length === 1) return `max ${matches[0]}`;
        return unit === 'let' ? 'Let' : 'Částka';
    }

    function formatTextContent(html) {
        let cleanHtml = html;
        if (cleanHtml.includes("Dodatek:")) {
            cleanHtml = cleanHtml.replace(/Dodatek:\s*([^<]+)/g, '<div class="appendix"><b>Dodatek:</b> $1</div>');
        }
        cleanHtml = cleanHtml.replace(/ODEBRAT\s+([^<|/]+)/g, '<span class="alert-red">ODEBRAT $1</span>');
        return cleanHtml;
    }

    async function loadLaws() {
        const container = document.getElementById('lawsContainer');
        try {
            const response = await fetch('tresty.html?v=' + Date.now());
            const html = await response.text();
            const temp = document.createElement('div');
            temp.innerHTML = html;
            
            container.innerHTML = "";
            temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
                const title = item.getAttribute('data-title');
                const subLines = item.querySelectorAll('.sub-line');
                let rows = "";

                subLines.forEach((line, rIdx) => {
                    const textOnly = line.innerText;
                    rows += `
                        <div class="sub-row">
                            <div class="sub-text">${formatTextContent(line.innerHTML)}</div>
                            <div class="input-group">
                                <div class="input-wrapper">
                                    <span class="input-label">Vězení</span>
                                    <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" placeholder="${extractLimits(textOnly, 'let')}">
                                </div>
                                <div class="input-wrapper">
                                    <span class="input-label">Pokuta</span>
                                    <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" placeholder="${extractLimits(textOnly, '$')}">
                                </div>
                                <button class="btn-add" onclick="addToCase('${title}', '${textOnly.replace(/'/g,"")}', ${lIdx}, ${rIdx})">+</button>
                            </div>
                        </div>`;
                });

                const card = document.createElement('div');
                card.className = 'law-card';
                card.innerHTML = `<div class="law-header" onclick="this.parentElement.classList.toggle('active')">
                    <div class="law-title">${title}</div><div style="color:var(--accent)">▼</div>
                </div><div class="law-content">${rows}</div>`;
                container.appendChild(card);
            });
        } catch (e) { container.innerHTML = "Chyba načítání databáze."; }
    }

    function addToCase(title, text, lIdx, rIdx) {
        const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
        const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
        if (j === 0 && f === 0) return;

        const matches = text.match(/ODEBRAT\s+([^.]+)/g);
        if (matches) {
            matches.forEach(m => docsToRevoke.add(m.replace("ODEBRAT ", "").trim()));
            document.getElementById('licenseAlert').style.display = 'block';
            document.getElementById('docsList').innerText = Array.from(docsToRevoke).join(", ");
        }

        const entry = document.createElement('div');
        entry.className = 'case-item';
        entry.innerHTML = `<b>${title}</b><br>${text.split("Dodatek:")[0].split("ODEBRAT")[0].trim()}
            <div style="margin-top:8px; display:flex; justify-content:space-between; font-weight:bold; border-top:1px solid #222; padding-top:4px;">
                <span style="color:var(--jail)">${j} LET</span><span style="color:var(--fine)">${f.toLocaleString()} $</span>
            </div>`;
        document.getElementById('caseEntries').appendChild(entry);
        jailTotal += j; fineTotal += f;
        document.getElementById('totalJail').innerText = jailTotal + " let";
        document.getElementById('totalFine').innerText = fineTotal.toLocaleString() + " $";
    }

    function filterLaws() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.law-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none");
    }

    window.onload = loadLaws;
</script>
</body>
</html>
