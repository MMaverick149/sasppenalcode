<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - MDT Terminal v58</title>
    <style>
        :root {
            --bg-main: #0a0b0d;
            --bg-panel: #14161a;
            --accent: #ffcc00;
            --danger: #ff4444;
            --jail-color: #00aaff;
            --fine-color: #00ff88;
            --border: #202124;
        }

        body { background: var(--bg-main); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* TUČNÉ PÍSMO JE ŽLUTÉ */
        b, strong { color: var(--accent) !important; font-weight: bold; }

        /* LOGIN OBRAZOVKA - POUZE VSTOUPIT */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 5000; display: flex; justify-content: center; align-items: center; }
        .login-btn { padding: 20px 60px; background: var(--jail-color); border: none; color: #fff; font-weight: 900; border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .login-btn:hover { background: #0088cc; transform: scale(1.05); }
        
        /* HLAVNÍ ROZLOŽENÍ */
        #mainApp { display: none; width: 100%; height: 100%; display: flex; }
        #leftPanel { flex: 3; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #rightPanel { flex: 1.2; min-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; }

        .header-bar { padding: 25px 30px; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
        #lawsContainer { padding: 20px; overflow-y: auto; flex-grow: 1; background: #0c0d0f; }

        /* KARTY ZÁKONŮ */
        .law-card { background: var(--bg-panel); border: 1px solid var(--border); margin-bottom: 12px; border-radius: 8px; }
        .law-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .law-content { display: none; padding: 15px 20px; border-top: 1px solid var(--border); }
        .law-card.active .law-content { display: block; }

        /* ODEBRAT V ČERVENÉM */
        .license-red { 
            background: rgba(255, 68, 68, 0.2); color: var(--danger); 
            padding: 4px 10px; border-radius: 4px; font-size: 11px; 
            font-weight: 900; text-transform: uppercase; display: inline-block; 
            margin-top: 10px; border: 1px solid var(--danger);
        }

        /* INPUTY */
        .input-box { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; width: 75px; text-align: center; border-radius: 4px; font-weight: bold; }
        .jail-input { border-color: var(--jail-color); color: var(--jail-color); }
        .fine-input { border-color: var(--fine-color); color: var(--fine-color); }

        /* PROTOKOL */
        .protocol-item { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid var(--jail-color); margin-bottom: 15px; position: relative; }
        .protocol-edit-input { background: transparent; border: none; border-bottom: 2px solid #333; color: inherit; width: 65px; text-align: center; font-weight: 900; font-size: 18px; outline: none; }

        .summary-box { padding: 25px; background: #000; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <button class="login-btn" onclick="handleLogin()">Vstoupit do MDT</button>
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div class="header-bar">
            <h1 style="margin:0; color:var(--accent); font-size:20px; margin-bottom:15px;">TRESTNÍ ZÁKONÍK</h1>
            <div style="display:flex; gap:10px;">
                <input type="text" id="searchInput" placeholder="Vyhledat paragraf..." oninput="renderLaws()" style="flex:2; background:#000; border:1px solid var(--border); color:#fff; padding:10px; border-radius:6px;">
                <button onclick="toggleHistory()" style="background:transparent; border:1px solid var(--border); color:#888; padding:0 15px; border-radius:6px; cursor:pointer;">HISTORIE</button>
            </div>
        </div>
        <div id="lawsContainer"></div>
    </div>

    <div id="rightPanel">
        <div style="padding:20px; border-bottom:1px solid var(--border); font-weight:800; color:var(--accent);">AKTIVNÍ PROTOKOL</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto; padding:15px;"></div>
        
        <div class="summary-box">
            <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:15px; font-size:16px;">
                <span>CELKEM:</span>
                <span><span id="sumJail" style="color:var(--jail-color)">0</span> let | <span id="sumFine" style="color:var(--fine-color)">0</span> <span style="color:var(--fine-color)">$</span></span>
            </div>
            <button onclick="saveCase()" style="width:100%; padding:15px; background:var(--jail-color); color:#fff; border:none; border-radius:6px; font-weight:900; cursor:pointer; text-transform:uppercase;">Uložit a Uzavřít</button>
        </div>
    </div>
</div>

<script>
    let protocolData = [];
    let allLaws = [];

    function handleLogin() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        loadLaws();
    }

    // FORMÁTOVÁNÍ TEXTU - ODEBRAT JE V ČERVENÉM
    function formatLawText(html) {
        return html.replace(/ODEBRAT (Zbrojní|Řidičský) Průkaz/gi, '<span class="license-red">ODEBRAT $1 PRŮKAZ</span>');
    }

    function extractLimits(text) {
        const jailMatch = text.match(/(\d+)\s*-\s*(\d+)\s*let/) || text.match(/od\s*(\d+)\s*let\s*do\s*(\d+)\s*let/) || text.match(/do\s*(\d+)\s*let/);
        const fineMatch = text.match(/do\s*výše\s*([\d.]+)\s*\$/);
        return {
            maxJail: jailMatch ? (jailMatch[2] ? parseInt(jailMatch[2]) : parseInt(jailMatch[1])) : 999,
            maxFine: fineMatch ? parseInt(fineMatch[1].replace('.', '')) : 999999,
            hasLic: text.includes("ODEBRAT")
        };
    }

    async function loadLaws() {
        const res = await fetch('tresty.html?v=' + Date.now());
        const html = await res.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        
        allLaws = Array.from(temp.querySelectorAll('.law-item')).map(item => ({
            title: item.getAttribute('data-title'),
            subs: Array.from(item.querySelectorAll('.sub-line')).map(line => ({
                html: line.innerHTML,
                text: line.innerText,
                ...extractLimits(line.innerText)
            }))
        }));
        renderLaws();
    }

    function renderLaws() {
        const container = document.getElementById('lawsContainer');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        container.innerHTML = allLaws.filter(l => l.title.toLowerCase().includes(searchTerm)).map(law => {
            const rows = law.subs.map((sub, idx) => `
                <div style="padding:12px 0; border-bottom:1px solid #222; display:flex; align-items:center; gap:10px;">
                    <div style="flex:1; font-size:12px; color:#ccc;">${formatLawText(sub.html)}</div>
                    <input type="number" class="input-box jail-input" id="j_${law.title}_${idx}" min="0" oninput="validateLimit(this, ${sub.maxJail})" placeholder="Let">
                    <input type="number" class="input-box fine-input" id="f_${law.title}_${idx}" min="0" oninput="validateLimit(this, ${sub.maxFine})" placeholder="$">
                    <button style="background:var(--accent); border:none; padding:8px 15px; border-radius:4px; font-weight:900; cursor:pointer;" onclick="addItem('${law.title}', ${idx})">+</button>
                </div>`).join('');
            return `<div class="law-card"><div class="law-header" onclick="this.parentElement.classList.toggle('active')"><span>${law.title}</span><span>▼</span></div><div class="law-content">${rows}</div></div>`;
        }).join('');
    }

    // STRIKTNÍ KONTROLA LIMITU DLE tresty.html
    function validateLimit(el, max) {
        if (parseInt(el.value) > max) {
            el.value = max;
            el.style.boxShadow = "0 0 10px var(--danger)";
            setTimeout(() => el.style.boxShadow = "none", 500);
        }
    }

    function addItem(title, idx) {
        const sub = allLaws.find(l => l.title === title).subs[idx];
        const jVal = parseInt(document.getElementById(`j_${title}_${idx}`).value) || 0;
        const fVal = parseInt(document.getElementById(`f_${title}_${idx}`).value) || 0;

        protocolData.push({ id: Date.now(), lawTitle: title, subText: sub.text, jail: jVal, fine: fVal, maxJail: sub.maxJail, maxFine: sub.maxFine, hasLic: sub.hasLic });
        renderProtocol();
    }

    function renderProtocol() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = protocolData.map(i => `
            <div class="protocol-item">
                <button onclick="removeItem(${i.id})" style="position:absolute; right:10px; top:10px; background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
                <div style="color:var(--accent); font-weight:900; font-size:14px; margin-bottom:5px;">${i.lawTitle}</div>
                <div style="font-size:11px; color:#aaa; margin-bottom:10px;">${i.subText}</div>
                <div style="display:flex; gap:25px; align-items:center;">
                    <span style="color:var(--jail-color); font-weight:900;">LET: <input type="number" class="protocol-edit-input p-jail" value="${i.jail}" oninput="updateProtocolVal(${i.id}, 'jail', this)"></span>
                    <span style="color:var(--fine-color); font-weight:900;">$: <input type="number" class="protocol-edit-input p-fine" value="${i.fine}" oninput="updateProtocolVal(${i.id}, 'fine', this)"></span>
                </div>
                ${i.hasLic ? `<div class="license-red" style="margin-top:10px; background: #000;">⚠ ODEBRAT PRŮKAZ DLE PARAGRAFU</div>` : ''}
            </div>`).join('');
        calculateSum();
    }

    function updateProtocolVal(id, key, el) {
        const item = protocolData.find(x => x.id === id);
        const max = key === 'jail' ? item.maxJail : item.maxFine;
        if (parseInt(el.value) > max) el.value = max;
        item[key] = parseInt(el.value) || 0;
        calculateSum();
    }

    function calculateSum() {
        let tj = 0, tf = 0;
        protocolData.forEach(i => { tj += i.jail; tf += i.fine; });
        document.getElementById('sumJail').innerText = tj;
        document.getElementById('sumFine').innerText = tf.toLocaleString();
    }

    function removeItem(id) { protocolData = protocolData.filter(x => x.id !== id); renderProtocol(); }

    function saveCase() {
        if (protocolData.length === 0) return;
        protocolData = []; renderProtocol(); alert("Případ uzavřen.");
    }
</script>
</body>
</html>
