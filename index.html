<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Penal Code</title>
    <style>
        :root {
            --bg-main: #0a0b0d;
            --bg-panel: #14161a;
            --accent: #ffcc00; /* ŽLUTÁ */
            --danger: #ff4444;
            --jail-color: #00aaff;  /* MODRÁ PRO ROKY */
            --fine-color: #00ff88;  /* ZELENÁ PRO POKUTY */
            --text-dim: #9aa0a6;
            --border: #202124;
        }

        body {
            background: var(--bg-main);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* GLOBÁLNÍ NASTAVENÍ PRO TUČNÉ PÍSMO */
        b, strong {
            color: var(--accent) !important;
        }

        /* UVÍTACÍ MODAL */
        #welcomeOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1c20 0%, #000 100%);
            z-index: 100000; display: flex; align-items: center; justify-content: center;
        }
        .welcome-card {
            background: var(--bg-panel); border: 1px solid var(--accent);
            padding: 60px; border-radius: 12px; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), 0 0 20px rgba(255,204,0,0.1);
        }
        .welcome-title { font-size: 38px; font-weight: 800; color: var(--accent); letter-spacing: 3px; margin-bottom: 5px; }
        .welcome-btn {
            background: var(--accent); color: #000; border: none; padding: 18px 50px;
            font-weight: 900; border-radius: 6px; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .welcome-btn:hover { background: #fff; transform: translateY(-2px); }

        /* PANELY */
        #leftPanel { flex: 3; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .header-bar { padding: 25px 30px; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
        .header-bar h1 { margin: 0; font-size: 22px; letter-spacing: 1px; color: var(--accent); }
        
        #searchInput {
            width: 100%; background: #000; border: 1px solid var(--border); color: #fff;
            padding: 15px 20px; border-radius: 8px; margin-top: 20px; outline: none; font-size: 16px;
        }

        #lawsContainer { padding: 20px 30px; overflow-y: auto; flex-grow: 1; background: #0c0d0f; }

        .law-card {
            background: var(--bg-panel); border: 1px solid var(--border);
            margin-bottom: 15px; border-radius: 8px; overflow: hidden;
        }
        .law-header { padding: 18px 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .law-title { font-weight: 700; color: var(--accent); text-transform: uppercase; font-size: 15px; }
        .law-content { display: none; padding: 0 25px 20px 25px; background: rgba(0,0,0,0.2); }
        .law-card.active .law-content { display: block; }
        .law-card.active { border-color: var(--accent); }

        .sub-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .sub-text { flex: 1; font-size: 14px; color: #cbd5e0; line-height: 1.6; padding-right: 20px; }

        .license-danger {
            background: rgba(255, 68, 68, 0.15); color: var(--danger);
            border: 1px solid var(--danger); font-weight: 800; text-transform: uppercase;
            font-size: 10px; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 8px;
        }

        /* VSTUPY VLEVO */
        .input-group { display: flex; gap: 10px; }
        .input-box {
            background: #000; padding: 10px; width: 85px; text-align: center; border-radius: 6px; outline: none; font-weight: bold;
        }
        .input-box.jail-input { border: 1px solid var(--jail-color); color: var(--jail-color); }
        .input-box.fine-input { border: 1px solid var(--fine-color); color: var(--fine-color); }
        
        .input-box::placeholder { opacity: 0.3; color: inherit; }
        
        /* BLOKOVANÉ SAZBY JSOU ZELENÉ */
        .input-box[readonly] { 
            background: rgba(0, 255, 136, 0.05); border-color: var(--fine-color) !important; color: var(--fine-color) !important; cursor: not-allowed; 
        }

        .btn-add {
            background: var(--accent); border: none; color: #000; padding: 0 15px;
            font-weight: 900; cursor: pointer; border-radius: 6px;
        }

        /* PRAVÝ PANEL */
        #rightPanel { flex: 1.2; min-width: 400px; background: var(--bg-panel); display: flex; flex-direction: column; }
        .protocol-header { padding: 25px; border-bottom: 1px solid var(--border); font-weight: 800; color: var(--accent); }
        #caseEntries { flex-grow: 1; overflow-y: auto; padding: 20px; }
        
        /* EDITAČNÍ VSTUPY V PROTOKOLU */
        .edit-jail { border: 1px solid var(--jail-color) !important; color: var(--jail-color) !important; width: 60px !important; padding: 5px !important; font-weight: bold; background: #000; }
        .edit-fine { border: 1px solid var(--fine-color) !important; color: var(--fine-color) !important; width: 85px !important; padding: 5px !important; font-weight: bold; background: #000; }

        .edit-jail[readonly], .edit-fine[readonly] {
            border-color: var(--fine-color) !important; color: var(--fine-color) !important; background: rgba(0, 255, 136, 0.02) !important; cursor: not-allowed !important;
        }

        /* SUMÁŘ */
        .summary-box { padding: 25px; background: #000; border-top: 1px solid var(--border); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 18px; font-weight: 700; }
        
        .btn-clear {
            width: 100%; background: transparent; border: 1px solid var(--danger);
            color: var(--danger); padding: 12px; border-radius: 6px; cursor: pointer;
            font-weight: 800; margin-top: 15px; transition: 0.3s;
        }
        .btn-clear:hover { background: var(--danger); color: #fff; }

        /* AUTOR */
        .dev-tag-container { padding: 15px 25px; background: #0c0d0f; border-top: 1px solid var(--border); }
        .dev-tag { display: flex; flex-direction: column; gap: 4px; padding: 10px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; font-family: monospace; }
        .dev-line { display: flex; justify-content: space-between; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .dev-label { color: #555; font-weight: bold; }
        .dev-value.highlight { color: var(--accent); font-weight: bold; }

        /* NOTIFIKACE DOPROSTŘED */
        #notification { 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(255, 68, 68, 0.95); 
            color: white; 
            padding: 30px 60px; 
            border-radius: 12px; 
            font-size: 20px;
            font-weight: 900; 
            z-index: 999999; 
            display: none; 
            text-transform: uppercase; 
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            border: 2px solid #fff;
            text-align: center;
        }

        #globalAlert { background: rgba(255, 68, 68, 0.1); border: 1px dashed var(--danger); color: var(--danger); padding: 12px; border-radius: 6px; margin-bottom: 15px; font-weight: 800; text-align: center; display: none; font-size: 12px; }
    </style>
</head>
<body>

<div id="welcomeOverlay">
    <div class="welcome-card">
        <div style="font-size:60px; margin-bottom:15px;">🚔</div>
        <div class="welcome-title">SASP MDT</div>
        <div style="color:var(--text-dim); margin-bottom:40px;">MOBILE DATA TERMINAL</div>
        <button class="welcome-btn" onclick="document.getElementById('welcomeOverlay').style.display='none'">Vstoupit</button>
    </div>
</div>

<div id="notification"></div>

<div id="leftPanel">
    <div class="header-bar">
        <h1>TRESTNÍ ZÁKONÍK</h1>
        <input type="text" id="searchInput" placeholder="Vyhledat..." oninput="doSearch()">
    </div>
    <div id="lawsContainer"></div>
</div>

<div id="rightPanel">
    <div class="protocol-header">AKTIVNÍ PROTOKOL</div>
    <div id="caseEntries"></div>
    
    <div class="summary-box">
        <div id="globalAlert">⚠ ZABAVIT: <span id="alertList"></span></div>
        <div class="summary-row"><span>CELKEM VĚZENÍ:</span> <span id="sumJail" style="color:var(--jail-color)">0 let</span></div>
        <div class="summary-row"><span>CELKEM POKUTA:</span> <span id="sumFine" style="color:var(--fine-color)">0 $</span></div>
        <button class="btn-clear" onclick="clearAll()">VYMAZAT PŘÍPAD</button>
    </div>

    <div class="dev-tag-container">
        <div class="dev-tag">
            <div class="dev-line"><span class="dev-label">System Developer</span><span class="dev-value highlight">Michal1448</span></div>
            <div class="dev-line"><span class="dev-label">Authorized for</span><span class="dev-value">Project GenK</span></div>
        </div>
    </div>
</div>

<script>
    let protocolData = [];

    async function loadLaws() {
        const res = await fetch('tresty.html?v=' + Date.now());
        const html = await res.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        const container = document.getElementById('lawsContainer');
        container.innerHTML = "";
        
        temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
            const title = item.getAttribute('data-title');
            let rows = "";
            item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                const fixJail = line.getAttribute('data-fix-jail');
                const fixFine = line.getAttribute('data-fix-fine');
                
                // Formátování textu: vše co bylo v HTML tučné bude žluté, 
                // přidáváme automatické zvýraznění důležitých pojmů
                let text = line.innerHTML
                    .replace(/ODEBRAT Zbrojní Průkaz/g, '<span class="license-danger">ODEBRAT Zbrojní Průkaz</span>')
                    .replace(/ODEBRAT Řidičský Průkaz/g, '<span class="license-danger">ODEBRAT Řidičský Průkaz</span>');

                rows += `
                    <div class="sub-row">
                        <div class="sub-text">${text}</div>
                        <div class="input-group">
                            <input type="number" class="input-box jail-input" id="j_${lIdx}_${rIdx}" 
                                value="${fixJail !== null ? fixJail : ''}" 
                                placeholder="${fixJail !== null ? '' : 'Let'}" 
                                ${fixJail !== null ? 'readonly' : ''}>
                            <input type="number" class="input-box fine-input" id="f_${lIdx}_${rIdx}" 
                                value="${fixFine !== null ? fixFine : ''}" 
                                placeholder="${fixFine !== null ? '' : 'Suma'}" 
                                ${fixFine !== null ? 'readonly' : ''}>
                            <button class="btn-add" onclick="addItem('${title}', ${lIdx}, ${rIdx})">+</button>
                        </div>
                    </div>`;
            });
            const card = document.createElement('div');
            card.className = 'law-card';
            card.innerHTML = `<div class="law-header" onclick="this.parentElement.classList.toggle('active')"><div class="law-title">${title}</div><div style="color:#444">▼</div></div><div class="law-content">${rows}</div>`;
            container.appendChild(card);
        });
    }

    function showNotify(msg) {
        const n = document.getElementById('notification');
        n.innerText = msg; n.style.display = 'block';
        setTimeout(() => { n.style.display = 'none'; }, 4000);
    }

    function addItem(title, lIdx, rIdx) {
        const jEl = document.getElementById(`j_${lIdx}_${rIdx}`);
        const fEl = document.getElementById(`f_${lIdx}_${rIdx}`);
        const userJail = parseInt(jEl.value) || 0;
        const userFine = parseInt(fEl.value) || 0;
        const rowEl = jEl.closest('.sub-row');
        const formattedHtml = rowEl.querySelector('.sub-text').innerHTML;

        // Kontrola limitů
        let boldNumbers = (formattedHtml.replace(/(?<=\d)\.(?=\d)/g, '').match(/\d+/g) || []).map(Number);
        if (!fEl.readOnly && userFine > 0) {
            const fineLimits = boldNumbers.filter(n => n >= 100);
            if (fineLimits.length >= 2) {
                const minF = Math.min(...fineLimits); const maxF = Math.max(...fineLimits);
                if (userFine < minF || userFine > maxF) { showNotify(`CHYBA: ${userFine}$ je mimo rozmezí, uprav to dle daného praragrafu !`); return; }
            }
        }
        if (!jEl.readOnly && userJail > 0) {
            const jailLimits = boldNumbers.filter(n => n > 0 && n < 100);
            if (jailLimits.length >= 2) {
                const minJ = Math.min(...jailLimits); const maxJ = Math.max(...jailLimits);
                if (userJail < minJ || userJail > maxJ) { showNotify(`CHYBA: ${userJail} let je mimo rozmezí, uprav to dle daného praragrafu !`); return; }
            }
        }

        if (userJail === 0 && userFine === 0 && !jEl.readOnly && !fEl.readOnly) return;
        
        protocolData.push({ 
            title, 
            jail: userJail, 
            fine: userFine, 
            html: formattedHtml,
            jailFixed: jEl.readOnly,
            fineFixed: fEl.readOnly 
        });
        render();
    }

    function updateEntry(idx, type, val) {
        protocolData[idx][type] = parseInt(val) || 0;
        calculateTotals();
    }

    function calculateTotals() {
        let tj = 0, tf = 0;
        let allLics = new Set();
        protocolData.forEach(i => {
            tj += i.jail; tf += i.fine;
            const lowHtml = i.html.toLowerCase();
            if (lowHtml.includes("zbrojní průkaz")) allLics.add("ZBROJNÍ PRŮKAZ");
            if (lowHtml.includes("řidičský průkaz")) allLics.add("ŘIDIČSKÝ PRŮKAZ");
        });
        document.getElementById('sumJail').innerText = tj + " let";
        document.getElementById('sumFine').innerText = tf.toLocaleString() + " $";
        
        const ga = document.getElementById('globalAlert');
        if (allLics.size > 0) {
            ga.style.display = "block";
            document.getElementById('alertList').innerText = Array.from(allLics).join(" + ");
        } else { ga.style.display = "none"; }
    }

    function render() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = "";
        protocolData.forEach((i, idx) => {
            cont.innerHTML += `<div style="background:#000; padding:15px; border-radius:8px; border-left:3px solid var(--jail-color); position:relative; margin-bottom:10px;">
                <button style="position:absolute; right:10px; top:10px; color:var(--danger); background:none; border:none; cursor:pointer; font-weight:bold;" onclick="removeItem(${idx})">×</button>
                <div style="color:var(--accent); font-weight:800; font-size:11px; margin-bottom:5px;">${i.title}</div>
                <div style="font-size:13px; color:#aaa; margin-bottom:10px;">${i.html}</div>
                
                <div style="display:flex; gap:15px; align-items:center;">
                    <div style="display:flex; align-items:center; gap:5px;">
                        <input type="number" class="input-box edit-jail" value="${i.jail}" 
                            oninput="updateEntry(${idx}, 'jail', this.value)" 
                            ${i.jailFixed ? 'readonly' : ''}>
                        <span style="font-size:12px; color:var(--jail-color);">let</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:5px;">
                        <input type="number" class="input-box edit-fine" value="${i.fine}" 
                            oninput="updateEntry(${idx}, 'fine', this.value)" 
                            ${i.fineFixed ? 'readonly' : ''}>
                        <span style="font-size:12px; color:var(--fine-color);">$</span>
                    </div>
                </div>
            </div>`;
        });
        calculateTotals();
    }

    function removeItem(idx) { protocolData.splice(idx, 1); render(); }
    function clearAll() { if(confirm("Vymazat protokol?")) { protocolData = []; render(); } }
    function doSearch() {
        const v = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.law-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(v) ? "block" : "none");
    }
    window.onload = loadLaws;
</script>
</body>
</html>
