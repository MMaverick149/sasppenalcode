<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Policejní Protokol - Finální Verze</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0c0c0c;
            --accent: #ffcc00;
            --border: #1a1a1a;
            --jail: #00aaff;
            --fine: #00ff88;
            --danger: #ff4444;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        /* LEVÝ PANEL */
        #leftPanel {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #searchInput {
            background: #111;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            border-left: 4px solid var(--accent);
        }

        .law-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            padding: 15px;
            cursor: pointer;
        }

        .law-card.active { border-color: var(--accent); }
        .law-title { color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .law-description { color: #555; font-size: 11px; margin-top: 4px; }
        .law-content { display: none; margin-top: 15px; border-top: 1px solid #1a1a1a; padding-top: 10px; }
        .law-card.active .law-content { display: block; }

        /* ŘÁDKY TRESTŮ */
        .sub-row { margin-bottom: 15px; }
        .sub-text { font-size: 13px; color: #ddd; margin-bottom: 8px; }
        .input-group { display: flex; gap: 8px; align-items: center; }
        .input-box {
            background: #000; border: 1px solid #333; color: #fff;
            padding: 5px; width: 65px; text-align: center; border-radius: 3px;
        }
        .btn-add {
            background: var(--accent); border: none; color: #000;
            padding: 5px 12px; font-weight: bold; cursor: pointer; border-radius: 3px;
        }

        /* PRAVÝ PANEL - PROTOKOL */
        #caseProtocol {
            flex: 1;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            height: 90vh;
            position: sticky;
            top: 20px;
            display: flex;
            flex-direction: column;
        }

        .protocol-title {
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 5px;
        }

        #caseEntries {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .case-item {
            background: #111;
            border: 1px solid #222;
            border-left: 3px solid var(--accent);
            padding: 10px;
            margin-bottom: 10px;
            position: relative;
        }

        .item-vals { display: flex; justify-content: space-between; margin-top: 10px; font-weight: bold; }
        .alert-text { color: var(--danger); font-size: 10px; font-weight: bold; text-transform: uppercase; margin-top: 5px; }

        /* SOUHRN DOLE */
        .summary-box {
            border-top: 2px solid var(--accent);
            padding-top: 15px;
            background: var(--card-bg);
        }

        .summary-line { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; font-size: 16px; }
        
        .btn-clear {
            width: 100%;
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-clear:hover { background: var(--danger); color: #000; }
        
        .btn-remove { position: absolute; right: 8px; top: 5px; color: #444; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>

    <div id="leftPanel">
        <input type="text" id="searchInput" placeholder="Vyhledat paragraf nebo klíčové slovo..." oninput="filterLaws()">
        <div id="lawsContainer"></div>
    </div>

    <div id="caseProtocol">
        <div class="protocol-title">AKTIVNÍ PROTOKOL</div>
        <div id="caseEntries"></div>
        
        <div class="summary-box">
            <div class="summary-line">Celkem vězení: <span id="totalJail" style="color:var(--jail)">0 let</span></div>
            <div class="summary-line">Celkem pokuta: <span id="totalFine" style="color:var(--fine)">0 $</span></div>
            <div id="licenseAlert" style="display:none; color:var(--danger); font-size:11px; margin-bottom:10px; font-weight:bold;">
                ⚠ ZABAVIT: <span id="docsList"></span>
            </div>
            <button class="btn-clear" onclick="clearProtocol()">VYMAZAT PŘÍPAD</button>
        </div>
    </div>

    <script>
        let activeCaseItems = [];

        async function loadLaws() {
            const container = document.getElementById('lawsContainer');
            const response = await fetch('tresty.html?v=' + Date.now());
            const html = await response.text();
            const temp = document.createElement('div');
            temp.innerHTML = html;
            
            container.innerHTML = ""; 

            temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
                const title = item.getAttribute('data-title');
                const desc = item.querySelector('.law-description')?.innerText || "";
                let rows = "";

                item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                    const fixFine = line.getAttribute('data-fix-fine');
                    const fixJail = line.getAttribute('data-fix-jail');
                    const innerH = line.innerHTML;

                    rows += `
                    <div class="sub-row">
                        <div class="sub-text">${innerH}</div>
                        <div class="input-group">
                            <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" value="${fixJail || ''}" placeholder="Let">
                            <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" value="${fixFine || ''}" placeholder="Suma">
                            <button class="btn-add" onclick="event.stopPropagation(); addToCase('${title}', '${line.innerText.replace(/'/g,"\\'")}', ${lIdx}, ${rIdx})">+</button>
                        </div>
                    </div>`;
                });

                const card = document.createElement('div');
                card.className = 'law-card';
                card.onclick = function() { this.classList.toggle('active'); };
                card.innerHTML = `<div class="law-title">${title}</div><div class="law-description">${desc}</div><div class="law-content">${rows}</div>`;
                container.appendChild(card);
            });
        }

        function filterLaws() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.law-card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
            });
        }

        function addToCase(title, fullText, lIdx, rIdx) {
            const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
            const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
            
            let docs = [];
            if (fullText.toUpperCase().includes("ZBROJNÍ")) docs.push("Zbrojní průkaz");
            if (fullText.toUpperCase().includes("ŘIDIČ")) docs.push("Řidičský průkaz");

            const variant = fullText.split(')')[0] + ")";
            activeCaseItems.push({ title, variant, jail: j, fine: f, docs });
            renderCase();
        }

        function renderCase() {
            const cont = document.getElementById('caseEntries');
            cont.innerHTML = "";
            let jT = 0, fT = 0, dS = new Set();

            activeCaseItems.forEach((i, idx) => {
                jT += i.jail; fT += i.fine;
                i.docs.forEach(d => dS.add(d));

                const div = document.createElement('div');
                div.className = 'case-item';
                div.innerHTML = `
                    <button class="btn-remove" onclick="removeEntry(${idx})">×</button>
                    <div style="color:var(--accent); font-weight:bold; font-size:12px;">${i.title}</div>
                    <div style="font-size:10px; color:#666;">${i.variant}</div>
                    ${i.docs.map(d => `<div class="alert-text">⚠ ZABAVIT ${d}</div>`).join("")}
                    <div class="item-vals">
                        <span style="color:var(--jail)">${i.jail} let</span>
                        <span style="color:var(--fine)">${i.fine.toLocaleString()} $</span>
                    </div>`;
                cont.appendChild(div);
            });

            document.getElementById('totalJail').innerText = jT + " let";
            document.getElementById('totalFine').innerText = fT.toLocaleString() + " $";
            
            const alertBox = document.getElementById('licenseAlert');
            if (dS.size > 0) {
                alertBox.style.display = "block";
                document.getElementById('docsList').innerText = Array.from(dS).join(", ");
            } else {
                alertBox.style.display = "none";
            }
        }

        function removeEntry(idx) { activeCaseItems.splice(idx, 1); renderCase(); }
        function clearProtocol() { activeCaseItems = []; renderCase(); }

        window.onload = loadLaws;
    </script>
</body>
</html>
