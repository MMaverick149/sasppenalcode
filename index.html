<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - MDT Terminal v77 STABLE</title>
    <style>
        :root {
            --bg-main: #0a0b0d;
            --bg-panel: #14161a;
            --accent: #ffcc00;
            --danger: #ff4444;
            --jail-color: #00aaff;
            --fine-color: #00ff88;
            --border: #202124;
        }

        body { background: var(--bg-main); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        b, strong { color: var(--accent) !important; font-weight: 900; }

        #mainApp { display: flex; width: 100%; height: 100%; }
        #leftPanel { flex: 3; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #rightPanel { flex: 1.3; min-width: 450px; background: var(--bg-panel); display: flex; flex-direction: column; }

        .header-bar { padding: 20px 30px; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
        #lawsContainer { padding: 20px; overflow-y: auto; flex-grow: 1; background: #0c0d0f; }

        .law-card { background: var(--bg-panel); border: 1px solid var(--border); margin-bottom: 12px; border-radius: 8px; overflow: hidden; }
        .law-header { padding: 15px 20px; cursor: pointer; color: var(--accent); font-weight: 900; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .law-header:hover { background: rgba(255, 204, 0, 0.05); }
        
        .law-content { display: none; padding: 0 20px 15px 20px; background: #111317; border-top: 1px solid var(--border); }
        .law-card.active .law-content { display: block; }

        .row { padding: 12px 0; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; }
        .input-box { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; width: 85px; text-align: center; border-radius: 4px; font-weight: bold; outline: none; }
        .input-jail { border-color: var(--jail-color); }
        .input-fine { border-color: var(--fine-color); }
        
        .input-box:disabled { border-color: var(--danger) !important; color: var(--danger) !important; background: rgba(255, 68, 68, 0.1); cursor: not-allowed; }

        .revoke-tag { background: var(--danger); color: white; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: 900; text-transform: uppercase; display: inline-block; }

        .btn-add { background: var(--accent); border: none; padding: 8px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; }
        .btn-add:hover { background: #e6b800; }

        .protocol-item { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid var(--jail-color); margin-bottom: 10px; position: relative; }
        .summary-box { padding: 25px; background: #000; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="mainApp">
    <div id="leftPanel">
        <div class="header-bar">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="margin:0; color:var(--accent);">TRESTNÍ ZÁKONÍK</h2>
                <button onclick="toggleHistory(true)" style="background:var(--jail-color); color:#fff; border:none; padding:8px 20px; cursor:pointer; border-radius:4px; font-weight:bold;">HISTORIE</button>
            </div>
            <input type="text" id="searchInput" placeholder="Hledat..." oninput="renderLaws()" style="width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:12px; border-radius:6px;">
        </div>
        <div id="lawsContainer"></div>
    </div>

    <div id="rightPanel">
        <div style="padding:20px; border-bottom:1px solid var(--border); font-weight:900; color:var(--accent);">AKTIVNÍ PROTOKOL</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto; padding:15px;"></div>
        <div class="summary-box">
            <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:20px; font-size:18px;">
                <span>CELKEM:</span>
                <span><span id="sumJail" style="color:var(--jail-color)">0</span> L | <span id="sumFine" style="color:var(--fine-color)">0</span> $</span>
            </div>
            <button onclick="saveCase()" style="width:100%; padding:18px; background:var(--jail-color); color:white; border:none; border-radius:4px; font-weight:900; cursor:pointer;">ULOŽIT PROTOKOL</button>
        </div>
    </div>
</div>

<script>
    let protocol = [];
    
    const lawsData = [
        {
            title: "§7 UBLÍŽENÍ NA ZDRAVÍ",
            subs: [
                { text: "a) neúmyslně a zbraní (1-5 let)", maxJ: 5, fixF: null, revoke: false },
                { text: "b) úmyslně a zbraní (1-5 let)", maxJ: 5, fixF: null, revoke: false },
                { text: "c) úmyslně a zbraní střelnou (3-10 let)", maxJ: 10, fixF: null, revoke: false },
                { text: "d) úmyslně proti úřední osobě (5-15 let)", maxJ: 15, fixF: 0, revoke: true },
                { text: "e) proti členům záchranných složek (10-20 let)", maxJ: 20, fixF: 0, revoke: true }
            ]
        },
        {
            title: "§25 KRÁDEŽ",
            subs: [
                { text: "a) hodnota do 20.000$ (přestupek)", maxJ: 0, fixF: null, revoke: false },
                { text: "b) hodnota do 200.000$ (1-3 roky)", maxJ: 3, fixF: null, revoke: true }
            ]
        }
    ];

    function toggleLaw(idx) {
        document.querySelectorAll('.law-card')[idx].classList.toggle('active');
    }

    function validate(el) {
        if (el.value < 0 || isNaN(el.value)) el.value = 0;
    }

    function init() {
        const container = document.getElementById('lawsContainer');
        container.innerHTML = lawsData.map((law, lIdx) => `
            <div class="law-card">
                <div class="law-header" onclick="toggleLaw(${lIdx})">
                    <span>${law.title}</span><span>▼</span>
                </div>
                <div class="law-content">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div style="flex:1; font-size:12px;">
                                ${sub.text}
                                ${sub.revoke ? `<br><span class="revoke-tag" style="margin-top:5px;">ODEBRAT PRŮKAZ</span>` : ''}
                            </div>
                            <input type="number" class="input-box input-jail" id="j_${lIdx}_${sIdx}" 
                                placeholder="Let" oninput="validate(this)" ${sub.maxJ === 0 ? 'disabled' : ''}>
                            <input type="number" class="input-box input-fine" id="f_${lIdx}_${sIdx}" 
                                placeholder="$" oninput="validate(this)" 
                                ${sub.fixF !== null ? 'disabled' : ''} value="${sub.fixF !== null ? sub.fixF : ''}">
                            <button class="btn-add" onclick="add(${lIdx}, ${sIdx})">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const sub = lawsData[lIdx].subs[sIdx];
        const j = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        const f = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;

        protocol.push({
            id: Date.now(),
            label: `${lawsData[lIdx].title} - ${sub.text.split('(')[0]}`,
            jail: j, fine: f, revoke: sub.revoke
        });
        updateProtocol();
    }

    function updateProtocol() {
        const list = document.getElementById('caseEntries');
        list.innerHTML = protocol.map(p => `
            <div class="protocol-item">
                <div style="font-size: 11px; color: var(--accent); font-weight: 900;">${p.label}</div>
                <div style="margin-top: 5px; font-weight: 900;">
                    <span style="color:var(--jail-color)">${p.jail} Let</span> | 
                    <span style="color:var(--fine-color)">$ ${p.fine.toLocaleString()}</span>
                </div>
                ${p.revoke ? `<div style="color:var(--danger); font-size: 10px; font-weight:900; margin-top:5px;">⚠ ZABAVIT ZBROJNÍ PRŮKAZ</div>` : ''}
                <button onclick="remove(${p.id})" style="position:absolute; right:10px; top:15px; background:none; border:none; color:#444; cursor:pointer;">✕</button>
            </div>
        `).join('');

        document.getElementById('sumJail').innerText = protocol.reduce((a, b) => a + b.jail, 0);
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    function remove(id) { protocol = protocol.filter(p => p.id !== id); updateProtocol(); }
    function saveCase() { alert("Data uložena."); protocol = []; updateProtocol(); }

    init();
</script>
</body>
</html>
