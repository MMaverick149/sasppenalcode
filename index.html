<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASP - Penal Code</title>
    <style>
        /* KOMPLETNÍ STYL PODLE TVÝCH OBRÁZKŮ */
        :root {
            --bg-dark: #000000;
            --card-bg: #0c0c0c;
            --accent: #ffcc00; /* Ta tvoje žlutá */
            --border: #1a1a1a;
            --text-desc: #555555;
            --jail: #00aaff;
            --fine: #00ff88;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        /* LEVÁ ČÁST - SEZNAM ZÁKONŮ */
        #lawsContainer {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* STYL KARTY (BOXU) */
        .law-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .law-card:hover {
            border-color: #333;
        }

        .law-card.active {
            border-color: var(--accent);
        }

        .law-title {
            color: var(--accent);
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
        }

        .law-header-desc {
            color: var(--text-desc);
            font-size: 11px;
            margin-top: 5px;
        }

        /* VNITŘEK KARTY S ODSTAVCI */
        .law-content {
            display: none;
            margin-top: 15px;
            border-top: 1px solid #1a1a1a;
            padding-top: 10px;
        }

        .law-card.active .law-content {
            display: block;
        }

        .sub-row {
            margin-bottom: 15px;
            padding: 5px 0;
        }

        .sub-text {
            font-size: 13px;
            margin-bottom: 8px;
            color: #ddd;
        }

        /* INPUTY A TLAČÍTKA */
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-box {
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 5px;
            width: 70px;
            text-align: center;
            border-radius: 3px;
        }

        .btn-add {
            background: none;
            border: 1px solid #333;
            color: #fff;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
        }

        .btn-add:hover {
            background: #222;
        }

        /* PRAVÁ ČÁST - AKTIVNÍ PROTOKOL */
        #caseProtocol {
            flex: 1;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .protocol-title {
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .case-item {
            border-bottom: 1px solid #1a1a1a;
            padding: 10px 0;
            position: relative;
        }

        .item-title {
            color: var(--accent);
            font-weight: bold;
            font-size: 13px;
        }

        .item-subtext {
            font-size: 11px;
            color: #666;
            margin-top: 3px;
        }

        .item-vals {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-weight: bold;
            font-size: 12px;
        }

        .summary-box {
            margin-top: 30px;
            border-top: 2px solid var(--accent);
            padding-top: 15px;
        }

        .summary-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-remove {
            position: absolute;
            right: 0;
            top: 10px;
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            font-size: 16px;
        }
        
        .btn-remove:hover { color: red; }
    </style>
</head>
<body>

    <div id="lawsContainer">
        </div>

    <div id="caseProtocol">
        <div class="protocol-title">AKTIVNÍ PROTOKOL</div>
        <div id="caseEntries"></div>
        
        <div class="summary-box">
            <div class="summary-line">Celkem vězení: <span id="totalJail" style="color:var(--jail)">0 let</span></div>
            <div class="summary-line">Celkem pokuta: <span id="totalFine" style="color:var(--fine)">0 $</span></div>
        </div>
    </div>

    <script>
        let activeCaseItems = [];

        async function loadLaws() {
            const container = document.getElementById('lawsContainer');
            const response = await fetch('tresty.html?v=' + Date.now());
            const html = await response.text();
            const temp = document.createElement('div');
            temp.innerHTML = html;
            
            container.innerHTML = ""; 

            temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
                const title = item.getAttribute('data-title') || "Paragraf";
                const desc = item.querySelector('.law-description')?.innerText || "";
                let rows = "";

                item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                    const fixFine = line.getAttribute('data-fix-fine');
                    const fixJail = line.getAttribute('data-fix-jail');
                    const innerH = line.innerHTML;
                    const cleanText = line.innerText.split('ODEBRAT')[0].trim();

                    rows += `
                    <div class="sub-row">
                        <div class="sub-text">${innerH}</div>
                        <div class="input-group">
                            <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" 
                                value="${fixJail || ''}" placeholder="Let" 
                                ${fixJail !== null ? 'readonly' : ''}>
                            <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" 
                                value="${fixFine || ''}" placeholder="Suma" 
                                ${fixFine !== null ? 'readonly' : ''}>
                            <button class="btn-add" onclick="event.stopPropagation(); addToCase('${title}', '${cleanText.replace(/'/g,"\\'")}', ${lIdx}, ${rIdx})">+</button>
                        </div>
                    </div>`;
                });

                const card = document.createElement('div');
                card.className = 'law-card';
                card.onclick = function() { this.classList.toggle('active'); };
                card.innerHTML = `
                    <div class="law-title">${title}</div>
                    <div class="law-header-desc">${desc}</div>
                    <div class="law-content">${rows}</div>`;
                container.appendChild(card);
            });
        }

        function addToCase(title, fullText, lIdx, rIdx) {
            const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
            const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
            
            // Extrakce varianty (písmeno na začátku)
            const variantMatch = fullText.match(/^([a-z]\))/i);
            const variant = variantMatch ? variantMatch[0] : "";
            const shortText = fullText.replace(variant, "").split('.')[0].trim();

            activeCaseItems.push({ title, subText: variant + " " + shortText, jail: j, fine: f });
            renderCase();
        }

        function renderCase() {
            const cont = document.getElementById('caseEntries');
            cont.innerHTML = "";
            let jT = 0, fT = 0;

            activeCaseItems.forEach((i, idx) => {
                jT += i.jail; fT += i.fine;
                const div = document.createElement('div');
                div.className = 'case-item';
                div.innerHTML = `
                    <button class="btn-remove" onclick="removeEntry(${idx})">×</button>
                    <div class="item-title">${i.title}</div>
                    <div class="item-subtext">${i.subText}</div>
                    <div class="item-vals">
                        <span style="color:var(--jail)">${i.jail} let</span>
                        <span style="color:var(--fine)">${i.fine.toLocaleString()} $</span>
                    </div>`;
                cont.appendChild(div);
            });

            document.getElementById('totalJail').innerText = jT + " let";
            document.getElementById('totalFine').innerText = fT.toLocaleString() + " $";
        }

        function removeEntry(idx) { activeCaseItems.splice(idx, 1); renderCase(); }

        window.onload = loadLaws;
    </script>
</body>
</html>
