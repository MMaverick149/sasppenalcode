    function extractLimits(text, unit) {
        const regex = new RegExp(`(\\d+[.\\d]*)\\s*${unit.replace('$', '\\$')}`, 'g');
        const matches = [...text.matchAll(regex)].map(m => m[1]);
        if (matches.length >= 2) return `${matches[0]}-${matches[1]}`;
        if (matches.length === 1) return `max ${matches[0]}`;
        return unit === 'let' ? 'Min-Max' : 'Částka';
    }

    function addToCase(title, text, lIdx, rIdx) {
        const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
        const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
        if (j === 0 && f === 0) return;

        const docs = [];
        if (text.toUpperCase().includes("ŘIDIČ")) docs.push("ODEBRAT ŘIDIČSKÉ OPRÁVNĚNÍ");
        if (text.toUpperCase().includes("ZBROJNÍ")) docs.push("ODEBRAT ZBROJNÍ PRŮKAZ");

        activeCaseItems.push({ id: Date.now(), title, jail: j, fine: f, docs });
        renderCase();
    }

    function renderCase() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = "";
        let jTot = 0, fTot = 0, allDocs = new Set();

        activeCaseItems.forEach(item => {
            jTot += item.jail; fTot += item.fine;
            item.docs.forEach(d => allDocs.add(d.replace("ODEBRAT ", "")));
            
            const div = document.createElement('div');
            div.className = 'case-item';
            div.innerHTML = `
                <button class="btn-remove" onclick="removeEntry(${item.id})">×</button>
                <span class="item-title">${item.title}</span>
                ${item.docs.map(d => `<div class="item-alert">${d}</div>`).join("")}
                <div class="item-vals">
                    <span style="color:var(--jail)">${item.jail} let</span> | 
                    <span style="color:var(--fine)">${item.fine.toLocaleString()} $</span>
                </div>`;
            cont.appendChild(div);
        });

        document.getElementById('totalJail').innerText = jTot + " let";
        document.getElementById('totalFine').innerText = fTot.toLocaleString() + " $";
        document.getElementById('licenseAlert').style.display = allDocs.size > 0 ? 'block' : 'none';
        document.getElementById('docsList').innerText = Array.from(allDocs).join(", ");
    }

    function removeEntry(id) {
        activeCaseItems = activeCaseItems.filter(i => i.id !== id);
        renderCase();
    }

    function filterLaws() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.law-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none");
    }

    window.onload = loadLaws;
</script>
