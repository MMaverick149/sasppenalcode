<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - MDT Terminal v79</title>
    <style>
        :root {
            --bg-main: #0a0b0d;
            --bg-panel: #14161a;
            --accent: #ffcc00;
            --danger: #ff4444;
            --jail-color: #00aaff;
            --fine-color: #00ff88;
            --border: #202124;
        }

        body { background: var(--bg-main); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #mainApp { display: flex; width: 100%; height: 100%; }
        #leftPanel { flex: 3; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #rightPanel { flex: 1.2; min-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; }

        .header-bar { padding: 20px 30px; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
        #lawsContainer { padding: 20px; overflow-y: auto; flex-grow: 1; background: #0c0d0f; }

        .law-card { background: var(--bg-panel); border: 1px solid var(--border); margin-bottom: 12px; border-radius: 8px; overflow: hidden; }
        .law-header { padding: 15px 20px; cursor: pointer; color: var(--accent); font-weight: 800; text-transform: uppercase; display: flex; justify-content: space-between; }
        .law-content { display: none; padding: 15px 20px; background: #111317; border-top: 1px solid var(--border); }
        .law-card.active .law-content { display: block; }

        .row { padding: 10px 0; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; }
        .input-box { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; width: 75px; text-align: center; border-radius: 4px; font-weight: bold; outline: none; }
        .input-jail { border-color: var(--jail-color); }
        .input-fine { border-color: var(--fine-color); }
        
        .input-box:disabled { border-color: var(--danger) !important; color: #555 !important; background: rgba(255, 68, 68, 0.05); cursor: not-allowed; }

        .btn-add { background: var(--accent); border: none; padding: 8px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; }

        .protocol-item { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid var(--jail-color); margin-bottom: 12px; position: relative; }
        .proto-label { color: var(--accent); font-weight: 900; font-size: 13px; margin-bottom: 5px; }
        .proto-sub { color: #888; font-size: 11px; margin-bottom: 8px; }
        .license-tag { background: var(--danger); color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; display: inline-block; margin-top: 5px; }

        .summary-box { padding: 25px; background: #000; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="mainApp">
    <div id="leftPanel">
        <div class="header-bar">
            <h2 style="margin:0; color:var(--accent);">TRESTNÍ ZÁKONÍK</h2>
            <input type="text" id="searchInput" placeholder="Hledat paragraf..." oninput="render()" style="width:100%; margin-top:15px; background:#000; border:1px solid var(--border); color:#fff; padding:10px; border-radius:6px;">
        </div>
        <div id="lawsContainer"></div>
    </div>

    <div id="rightPanel">
        <div style="padding:20px; border-bottom:1px solid var(--border); font-weight:800; color:var(--accent);">AKTIVNÍ PROTOKOL PŘÍPADU</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto; padding:15px;"></div>
        <div class="summary-box">
            <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:15px; font-size:18px;">
                <span>CELKEM:</span>
                <span><span id="sumJail" style="color:var(--jail-color)">0</span> let | <span id="sumFine" style="color:var(--fine-color)">0</span> $</span>
            </div>
            <button onclick="save()" style="width:100%; padding:18px; background:var(--jail-color); color:white; border:none; border-radius:6px; font-weight:900; cursor:pointer;">ULOŽIT A UZAVŘÍT</button>
        </div>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];

    async function load() {
        try {
            const res = await fetch('tresty.html?v=' + Date.now());
            const html = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            laws = Array.from(doc.querySelectorAll('.law-item')).map(item => ({
                title: item.getAttribute('data-title'),
                subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                    const text = line.innerText;
                    // Detekce odstavce (např. "a)")
                    const letterMatch = text.match(/^([a-z]\))/i);
                    // Detekce možnosti pokuty
                    const canFine = text.toLowerCase().includes("pokutou") || text.toLowerCase().includes("peněžitým");
                    
                    return {
                        html: line.innerHTML,
                        fullText: text,
                        letter: letterMatch ? letterMatch[1] : "",
                        canFine: canFine,
                        lic: text.includes("ODEBRAT")
                    };
                })
            }));
            render();
        } catch (e) { console.error("Chyba načítání:", e); }
    }

    function render() {
        const container = document.getElementById('lawsContainer');
        const search = document.getElementById('searchInput').value.toLowerCase();

        container.innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div class="law-card">
                <div class="law-header" onclick="this.parentElement.classList.toggle('active')">
                    <span>${law.title}</span><span>▼</span>
                </div>
                <div class="law-content">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div style="flex:1; font-size:12px;">${sub.html}</div>
                            <input type="number" class="input-box input-jail" id="j_${lIdx}_${sIdx}" placeholder="Let">
                            <input type="number" class="input-box input-fine" id="f_${lIdx}_${sIdx}" 
                                placeholder="${sub.canFine ? '$' : 'Blokováno'}" 
                                ${!sub.canFine ? 'disabled' : ''}>
                            <button class="btn-add" onclick="add(${lIdx}, ${sIdx})">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const law = laws[lIdx];
        const sub = law.subs[sIdx];
        const jail = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        const fine = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;

        protocol.push({
            id: Date.now(),
            title: law.title,
            letter: sub.letter,
            desc: sub.fullText.split(')')[1] || sub.fullText,
            jail: jail,
            fine: fine,
            lic: sub.lic
        });
        updateProtocol();
    }

    function updateProtocol() {
        const list = document.getElementById('caseEntries');
        list.innerHTML = protocol.map(p => `
            <div class="protocol-item">
                <div class="proto-label">${p.title} ${p.letter}</div>
                <div class="proto-sub">${p.desc.substring(0, 80)}...</div>
                <div style="font-weight: 900; font-size: 14px;">
                    <span style="color:var(--jail-color)">${p.jail} let</span> | 
                    <span style="color:var(--fine-color)">$ ${p.fine.toLocaleString()}</span>
                </div>
                ${p.lic ? `<div class="license-tag">⚠ ODEBRAT ZBROJNÍ PRŮKAZ</div>` : ''}
                <button onclick="remove(${p.id})" style="position:absolute; right:10px; top:15px; background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
            </div>
        `).join('');

        document.getElementById('sumJail').innerText = protocol.reduce((a, b) => a + b.jail, 0);
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    function remove(id) { protocol = protocol.filter(x => x.id !== id); updateProtocol(); }
    function save() { alert("Protokol uložen do databáze."); protocol = []; updateProtocol(); }

    load();
</script>
</body>
</html>
