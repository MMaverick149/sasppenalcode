<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - MDT Terminal v46</title>
    <style>
        :root {
            --bg-main: #0a0b0d;
            --bg-panel: #14161a;
            --accent: #ffcc00;
            --danger: #ff4444;
            --jail-color: #00aaff;
            --fine-color: #00ff88;
            --text-dim: #9aa0a6;
            --border: #202124;
        }

        body {
            background: var(--bg-main);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        b, strong { color: var(--accent) !important; }

        /* MODAL */
        #welcomeOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1c20 0%, #000 100%);
            z-index: 100000; display: flex; align-items: center; justify-content: center;
        }
        .welcome-card {
            background: var(--bg-panel); border: 1px solid var(--accent);
            padding: 60px; border-radius: 12px; text-align: center;
        }
        .welcome-btn {
            background: var(--accent); color: #000; border: none; padding: 18px 50px;
            font-weight: 900; border-radius: 6px; cursor: pointer; text-transform: uppercase;
        }

        /* PANELY */
        #leftPanel { flex: 3; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .header-bar { padding: 25px 30px; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
        
        .controls-row { display: flex; gap: 15px; margin-top: 20px; }
        #searchInput { flex: 2; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px 15px; border-radius: 6px; outline: none; }
        #sortSelect { flex: 1; background: #000; border: 1px solid var(--border); color: var(--accent); padding: 12px; border-radius: 6px; cursor: pointer; outline: none; font-weight: bold; }

        #lawsContainer { padding: 20px 30px; overflow-y: auto; flex-grow: 1; background: #0c0d0f; }

        .law-card { background: var(--bg-panel); border: 1px solid var(--border); margin-bottom: 15px; border-radius: 8px; overflow: hidden; position: relative; }
        .law-header { padding: 18px 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .law-title { font-weight: 700; color: var(--accent); text-transform: uppercase; font-size: 15px; }
        
        /* ODZNAK POUŽITÍ */
        .usage-badge { position: absolute; right: 50px; top: 20px; font-size: 10px; background: rgba(255,204,0,0.1); color: var(--accent); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255,204,0,0.2); }

        .law-description { font-size: 13px; color: #888; padding: 5px 25px 15px 25px; line-height: 1.5; font-style: italic; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .law-content { display: none; padding: 0 25px 20px 25px; background: rgba(0,0,0,0.2); }
        .law-card.active .law-content { display: block; }
        .law-card.active { border-color: var(--accent); }

        .sub-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sub-text { flex: 1; font-size: 14px; color: #cbd5e0; line-height: 1.6; padding-right: 20px; }

        .input-group { display: flex; gap: 10px; }
        .input-box { background: #000; padding: 10px; width: 85px; text-align: center; border-radius: 6px; outline: none; font-weight: bold; border: 1px solid var(--border); }
        .input-box.jail-input { border-color: var(--jail-color); color: var(--jail-color); }
        .input-box.fine-input { border-color: var(--fine-color); color: var(--fine-color); }
        .input-box[readonly] { background: rgba(255, 68, 68, 0.05) !important; border-color: var(--danger) !important; color: var(--danger) !important; }

        .btn-add { background: var(--accent); border: none; color: #000; padding: 0 15px; font-weight: 900; cursor: pointer; border-radius: 6px; }

        #rightPanel { flex: 1.2; min-width: 400px; background: var(--bg-panel); display: flex; flex-direction: column; }
        .protocol-header { padding: 25px; border-bottom: 1px solid var(--border); font-weight: 800; color: var(--accent); }
        #caseEntries { flex-grow: 1; overflow-y: auto; padding: 20px; }
        
        .summary-box { padding: 25px; background: #000; border-top: 1px solid var(--border); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 18px; font-weight: 700; }
        .btn-clear { width: 100%; background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 800; margin-top: 15px; }

        #notification { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255, 68, 68, 0.95); color: white; padding: 30px 60px; border-radius: 12px; font-size: 20px; font-weight: 900; z-index: 999999; display: none; text-transform: uppercase; border: 2px solid #fff; }
    </style>
</head>
<body>

<div id="welcomeOverlay">
    <div class="welcome-card">
        <div style="font-size:60px; margin-bottom:15px;">🚔</div>
        <div style="font-size: 38px; font-weight: 800; color: var(--accent); letter-spacing: 3px; margin-bottom: 5px;">SASP MDT</div>
        <div style="color:var(--text-dim); margin-bottom:40px;">v46 (Statistiky & Řazení)</div>
        <button class="welcome-btn" onclick="document.getElementById('welcomeOverlay').style.display='none'">Vstoupit</button>
    </div>
</div>

<div id="notification"></div>

<div id="leftPanel">
    <div class="header-bar">
        <h1>TRESTNÍ ZÁKONÍK</h1>
        <div class="controls-row">
            <input type="text" id="searchInput" placeholder="Vyhledat paragraf..." oninput="renderLaws()">
            <select id="sortSelect" onchange="renderLaws()">
                <option value="default">Řadit: Podle zákona</option>
                <option value="usage">Řadit: Nejpoužívanější</option>
            </select>
        </div>
    </div>
    <div id="lawsContainer"></div>
</div>

<div id="rightPanel">
    <div class="protocol-header">AKTIVNÍ PROTOKOL</div>
    <div id="caseEntries"></div>
    <div class="summary-box">
        <div class="summary-row"><span>CELKEM VĚZENÍ:</span> <span id="sumJail" style="color:var(--jail-color)">0 let</span></div>
        <div class="summary-row"><span>CELKEM POKUTA:</span> <span id="sumFine" style="color:var(--fine-color)">0 $</span></div>
        <button class="btn-clear" onclick="clearAll()">VYMAZAT PŘÍPAD</button>
    </div>
</div>

<script>
    let protocolData = [];
    let allLaws = [];
    // Načtení statistik z LocalStorage
    let lawStats = JSON.parse(localStorage.getItem('sasp_stats')) || {};

    async function loadLaws() {
        const res = await fetch('tresty.html?v=' + Date.now());
        const html = await res.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        
        allLaws = Array.from(temp.querySelectorAll('.law-item')).map((item, idx) => {
            const title = item.getAttribute('data-title');
            const desc = item.querySelector('.law-description')?.innerHTML || "";
            const subs = Array.from(item.querySelectorAll('.sub-line')).map(line => ({
                text: line.innerHTML,
                fixJail: line.getAttribute('data-fix-jail'),
                fixFine: line.getAttribute('data-fix-fine')
            }));
            return { id: title, title, desc, subs, defaultOrder: idx };
        });
        renderLaws();
    }

    function renderLaws() {
        const container = document.getElementById('lawsContainer');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const sortBy = document.getElementById('sortSelect').value;

        let filtered = allLaws.filter(l => l.title.toLowerCase().includes(searchTerm) || l.desc.toLowerCase().includes(searchTerm));

        if (sortBy === 'usage') {
            filtered.sort((a, b) => (lawStats[b.id] || 0) - (lawStats[a.id] || 0));
        } else {
            filtered.sort((a, b) => a.defaultOrder - b.defaultOrder);
        }

        container.innerHTML = "";
        filtered.forEach((law, lIdx) => {
            const usage = lawStats[law.id] || 0;
            let rows = "";
            law.subs.forEach((sub, rIdx) => {
                rows += `
                    <div class="sub-row">
                        <div class="sub-text">${sub.text}</div>
                        <div class="input-group">
                            <input type="number" class="input-box jail-input" id="j_${law.id}_${rIdx}" value="${sub.fixJail || ''}" ${sub.fixJail ? 'readonly' : 'placeholder="Let"'}>
                            <input type="number" class="input-box fine-input" id="f_${law.id}_${rIdx}" value="${sub.fixFine || ''}" ${sub.fixFine ? 'readonly' : 'placeholder="Suma"'}>
                            <button class="btn-add" onclick="addItem('${law.id}', ${rIdx})">+</button>
                        </div>
                    </div>`;
            });

            const card = document.createElement('div');
            card.className = 'law-card';
            card.innerHTML = `
                <div class="law-header" onclick="this.parentElement.classList.toggle('active')">
                    <div class="law-title">${law.title}</div>
                    ${usage > 0 ? `<div class="usage-badge">Použito: ${usage}x</div>` : ''}
                    <div style="color:#444">▼</div>
                </div>
                ${law.desc ? `<div class="law-description">${law.desc}</div>` : ''}
                <div class="law-content">${rows}</div>`;
            container.appendChild(card);
        });
    }

    function addItem(lawId, rIdx) {
        const jEl = document.getElementById(`j_${lawId}_${rIdx}`);
        const fEl = document.getElementById(`f_${lawId}_${rIdx}`);
        const jail = parseInt(jEl.value) || 0;
        const fine = parseInt(fEl.value) || 0;

        if (jail === 0 && fine === 0 && !jEl.readOnly) return;

        // ULOŽENÍ STATISTIKY
        lawStats[lawId] = (lawStats[lawId] || 0) + 1;
        localStorage.setItem('sasp_stats', JSON.stringify(lawStats));

        protocolData.push({ 
            title: lawId, jail, fine, 
            html: jEl.closest('.sub-row').querySelector('.sub-text').innerHTML,
            jailFixed: jEl.readOnly, fineFixed: fEl.readOnly 
        });
        
        renderProtocol();
        // Pokud řadíme podle použití, překreslíme seznam, aby se nejpoužívanější posunul nahoru
        if (document.getElementById('sortSelect').value === 'usage') renderLaws();
    }

    function renderProtocol() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = "";
        let tj = 0, tf = 0;
        protocolData.forEach((i, idx) => {
            tj += i.jail; tf += i.fine;
            cont.innerHTML += `
            <div style="background:#000; padding:15px; border-radius:8px; border-left:3px solid var(--jail-color); position:relative; margin-bottom:10px;">
                <button style="position:absolute; right:10px; top:10px; color:var(--danger); background:none; border:none; cursor:pointer;" onclick="removeItem(${idx})">×</button>
                <div style="color:var(--accent); font-weight:800; font-size:11px;">${i.title}</div>
                <div style="font-size:13px; color:#aaa; margin:5px 0 10px 0;">${i.html}</div>
                <div style="color:${i.jailFixed?'var(--danger)':'var(--jail-color)'}; font-weight:bold;">${i.jail} let | <span style="color:${i.fineFixed?'var(--danger)':'var(--fine-color)'}">${i.fine.toLocaleString()} $</span></div>
            </div>`;
        });
        document.getElementById('sumJail').innerText = tj + " let";
        document.getElementById('sumFine').innerText = tf.toLocaleString() + " $";
    }

    function removeItem(idx) { protocolData.splice(idx, 1); renderProtocol(); }
    function clearAll() { if(confirm("Vymazat?")) { protocolData = []; renderProtocol(); } }
    window.onload = loadLaws;
</script>
</body>
</html>
