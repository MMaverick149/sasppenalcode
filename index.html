<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - MDT Terminal v71</title>
    <style>
        :root {
            --bg-main: #0a0b0d;
            --bg-panel: #14161a;
            --accent: #ffcc00;
            --danger: #ff4444;
            --jail-color: #00aaff;
            --fine-color: #00ff88;
            --border: #202124;
        }

        body { background: var(--bg-main); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .accent-bold { color: var(--accent) !important; font-weight: 900; }

        #mainApp { display: flex; width: 100%; height: 100%; }
        #leftPanel { flex: 3; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #rightPanel { flex: 1.2; min-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; }

        .header-bar { padding: 20px 30px; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
        #lawsContainer { padding: 20px; overflow-y: auto; flex-grow: 1; background: #0c0d0f; }

        .law-card { background: var(--bg-panel); border: 1px solid var(--border); margin-bottom: 12px; border-radius: 8px; overflow: hidden; }
        .law-header { padding: 15px 20px; cursor: pointer; color: var(--accent); font-weight: 900; text-transform: uppercase; display: flex; justify-content: space-between; }
        .law-content { display: none; padding: 15px 20px; background: #111317; border-top: 1px solid var(--border); }
        .law-card.active .law-content { display: block; }

        .input-box { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; width: 85px; text-align: center; border-radius: 4px; font-weight: bold; }
        .input-box:disabled { color: #555; cursor: not-allowed; background: #0a0a0a; border-color: #333; }
        .input-jail { border-color: var(--jail-color); }
        .input-fine { border-color: var(--fine-color); }

        .protocol-item { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid var(--jail-color); margin-bottom: 10px; position: relative; }
        
        /* BANNER PRO ODEBRÁNÍ PRŮKAZU */
        .license-warning { 
            background: var(--danger); color: white; padding: 12px; border-radius: 4px; 
            font-weight: 900; text-align: center; margin-bottom: 10px; text-transform: uppercase;
            border: 2px solid #fff; box-shadow: 0 0 10px rgba(255, 68, 68, 0.4);
            font-size: 13px;
        }

        .summary-box { padding: 25px; background: #000; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="mainApp">
    <div id="leftPanel">
        <div class="header-bar">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 class="accent-bold">TRESTNÍ ZÁKONÍK</h2>
                <button onclick="toggleAudit(true)" style="background:var(--jail-color); color:white; border:none; padding:10px 20px; cursor:pointer; font-weight:bold; border-radius:4px;">HISTORIE AUDITU</button>
            </div>
            <input type="text" id="searchInput" placeholder="Hledat..." oninput="renderLaws()" style="width:100%; margin-top:15px; padding:12px; background:#000; border:1px solid var(--border); color:white; border-radius:6px;">
        </div>
        <div id="lawsContainer"></div>
    </div>

    <div id="rightPanel">
        <div style="padding:20px; border-bottom:1px solid var(--border);" class="accent-bold">AKTIVNÍ PROTOKOL PŘÍPADU</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto; padding:15px;"></div>
        
        <div id="licenseArea" style="padding:0 15px;"></div>

        <div class="summary-box">
            <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:15px; font-size:20px;">
                <span class="accent-bold">CELKEM:</span>
                <span><span id="sumJail" style="color:var(--jail-color)">0</span> L | <span id="sumFine" style="color:var(--fine-color)">0</span> $</span>
            </div>
            <button onclick="saveCase()" style="width:100%; padding:20px; background:var(--jail-color); color:white; border:none; border-radius:6px; font-weight:900; cursor:pointer; text-transform:uppercase;">ULOŽIT A UZAVŘÍT</button>
        </div>
    </div>
</div>

<script>
    let protocol = [];
    let laws = [];

    async function load() {
        const res = await fetch('tresty.html?v=' + Date.now());
        const html = await res.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        
        laws = Array.from(temp.querySelectorAll('.law-item')).map(item => ({
            title: item.getAttribute('data-title'),
            subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                const txt = line.innerText;
                const rJ = txt.match(/(\d+)\s*-\s*(\d+)\s*let/);
                const sJ = txt.match(/(\d+)\s*let/);
                const rF = txt.match(/do\s*výše\s*([\d.]+)\s*\$/);
                
                // Určení, zda je hodnota fixní (např. "10 let" vs "10-20 let")
                const isFixedJ = sJ && !rJ;
                
                return {
                    html: line.innerHTML,
                    text: txt,
                    maxJ: rJ ? parseInt(rJ[2]) : (sJ ? parseInt(sJ[1]) : 0),
                    maxF: rF ? parseInt(rF[1].replace(/\./g, '')) : 999999,
                    fixedJ: isFixedJ ? parseInt(sJ[1]) : null,
                    mustRevoke: txt.toUpperCase().includes("ODEBRAT")
                };
            })
        }));
        renderLaws();
    }

    function valInput(el, max) {
        let v = parseInt(el.value) || 0;
        if (v > max) el.value = max; // TVRDÝ LIMIT
    }

    function renderLaws() {
        const container = document.getElementById('lawsContainer');
        const query = document.getElementById('searchInput').value.toLowerCase();

        container.innerHTML = laws.filter(l => l.title.toLowerCase().includes(query)).map(law => {
            const rows = law.subs.map((sub, idx) => `
                <div style="padding:10px 0; border-bottom:1px solid #222; display:flex; align-items:center; gap:10px;">
                    <div style="flex:1; font-size:12px;">${sub.html}</div>
                    <input type="number" class="input-box input-jail" id="j_${law.title}_${idx}" 
                        value="${sub.fixedJ || ''}" 
                        placeholder="Let" 
                        ${sub.fixedJ !== null ? 'disabled' : ''} 
                        oninput="valInput(this, ${sub.maxJ})">
                    
                    <input type="number" class="input-box input-fine" id="f_${law.title}_${idx}" 
                        placeholder="$" 
                        oninput="valInput(this, ${sub.maxF})">
                    
                    <button onclick="add('${law.title}', ${idx})" style="background:var(--accent); border:none; padding:8px 12px; border-radius:4px; font-weight:900; cursor:pointer;">+</button>
                </div>`).join('');
            return `<div class="law-card"><div class="law-header" onclick="this.parentElement.classList.toggle('active')"><span>${law.title}</span><span>▼</span></div><div class="law-content">${rows}</div></div>`;
        }).join('');
    }

    function add(title, idx) {
        const s = laws.find(l => l.title === title).subs[idx];
        const j = parseInt(document.getElementById(`j_${title}_${idx}`).value) || s.fixedJ || 0;
        const f = parseInt(document.getElementById(`f_${title}_${idx}`).value) || 0;

        protocol.push({ id: Date.now(), title, text: s.text, jail: j, fine: f, revoke: s.mustRevoke });
        renderProtocol();
    }

    function renderProtocol() {
        const container = document.getElementById('caseEntries');
        container.innerHTML = protocol.map(p => `
            <div class="protocol-item">
                <button onclick="remove(${p.id})" style="position:absolute; right:10px; top:10px; background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
                <div class="accent-bold" style="font-size:12px;">${p.title}</div>
                <div style="font-size:11px; color:#888; margin: 5px 0;">${p.text}</div>
                <div style="font-weight:900;">
                    <span style="color:var(--jail-color)">${p.jail} let</span> | <span style="color:var(--fine-color)">$ ${p.fine.toLocaleString()}</span>
                </div>
                ${p.revoke ? `<div style="color:var(--danger); font-size:10px; font-weight:900; margin-top:5px;">⚠ ODEBRAT PRŮKAZ DLE PARAGRAFU</div>` : ''}
            </div>`).join('');
        
        document.getElementById('sumJail').innerText = protocol.reduce((a, b) => a + b.jail, 0);
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();

        const hasRevoke = protocol.some(p => p.revoke);
        document.getElementById('licenseArea').innerHTML = hasRevoke ? `<div class="license-warning">⚠ ODEBRAT ZBROJNÍ PRŮKAZ (PŘÍTOMNO V PŘÍPADU) ⚠</div>` : '';
    }

    function remove(id) { protocol = protocol.filter(p => p.id !== id); renderProtocol(); }

    function saveCase() {
        if(!protocol.length) return;
        alert("Případ uložen do systému.");
        protocol = [];
        renderProtocol();
    }

    load();
</script>
</body>
</html>
