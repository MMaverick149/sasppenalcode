<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - MDT Terminal v68</title>
    <style>
        :root {
            --bg-main: #0a0b0d;
            --bg-panel: #14161a;
            --accent: #ffcc00;
            --danger: #ff4444;
            --jail-color: #00aaff;
            --fine-color: #00ff88;
            --border: #202124;
        }

        body { background: var(--bg-main); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* TUČNÝ TEXT JE ŽLUTÝ */
        b, strong, .accent-bold, h1, h2, h3, .law-header { 
            color: var(--accent) !important; 
            font-weight: 900 !important; 
        }

        #mainApp { display: flex; width: 100%; height: 100%; }
        #leftPanel { flex: 3; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #rightPanel { flex: 1.2; min-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; }

        .header-bar { padding: 20px 30px; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
        #lawsContainer { padding: 20px; overflow-y: auto; flex-grow: 1; background: #0c0d0f; }

        .law-card { background: var(--bg-panel); border: 1px solid var(--border); margin-bottom: 12px; border-radius: 8px; }
        .law-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; text-transform: uppercase; }
        .law-content { display: none; padding: 15px 20px; border-top: 1px solid var(--border); background: #111317; }
        .law-card.active .law-content { display: block; }

        .input-box { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; width: 85px; text-align: center; border-radius: 4px; font-weight: bold; }
        .input-jail { border-color: var(--jail-color); }
        .input-fine { border-color: var(--fine-color); }
        .input-box:disabled { opacity: 0.6; color: #aaa; background: #1a1a1a; cursor: not-allowed; }

        /* PULZUJÍCÍ VAROVÁNÍ */
        @keyframes pulse-danger {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(255, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }

        .license-tag-red { 
            background: var(--danger); color: #fff; padding: 10px; border-radius: 4px; 
            font-size: 13px; font-weight: 900; text-transform: uppercase;
            text-align: center; margin-bottom: 10px;
            animation: pulse-danger 2s infinite;
        }

        .summary-box { padding: 25px; background: #000; border-top: 1px solid var(--border); }
        .btn-save { width: 100%; padding: 18px; background: var(--jail-color); color: #fff; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="mainApp">
    <div id="leftPanel">
        <div class="header-bar">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2>TRESTNÍ ZÁKONÍK</h2>
                <button onclick="openAudit()" style="background:var(--accent); color:#000; border:none; padding:8px 20px; cursor:pointer; border-radius:4px; font-weight:bold;">HISTORIE AUDITU</button>
            </div>
            <input type="text" id="searchInput" placeholder="Vyhledat paragraf..." oninput="renderLaws()" style="width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:12px; border-radius:6px;">
        </div>
        <div id="lawsContainer"></div>
    </div>

    <div id="rightPanel">
        <div style="padding:20px; border-bottom:1px solid var(--border);" class="accent-bold">AKTIVNÍ PROTOKOL PŘÍPADU</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto; padding:15px;"></div>
        
        <div id="summaryWarnings" style="padding: 0 20px;"></div>

        <div class="summary-box">
            <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:15px; font-size:22px;">
                <span class="accent-bold">CELKEM:</span>
                <span><span id="sumJail" style="color:var(--jail-color)">0</span> let | <span id="sumFine" style="color:var(--fine-color)">0</span> $</span>
            </div>
            <button class="btn-save" onclick="saveCase()">ULOŽIT A UZAVŘÍT</button>
        </div>
    </div>
</div>

<script>
    let protocolData = [];
    let allLaws = [];

    async function loadLaws() {
        try {
            const res = await fetch('tresty.html?v=' + Date.now());
            const html = await res.text();
            const temp = document.createElement('div');
            temp.innerHTML = html;
            
            allLaws = Array.from(temp.querySelectorAll('.law-item')).map(item => ({
                title: item.getAttribute('data-title'),
                subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                    // Načtení fixních hodnot z HTML atributů
                    const fixJ = line.getAttribute('data-fix-jail');
                    const fixF = line.getAttribute('data-fix-fine');
                    
                    return {
                        html: line.innerHTML,
                        text: line.innerText,
                        fixJail: fixJ !== null ? parseInt(fixJ) : null,
                        fixFine: fixF !== null ? parseInt(fixF) : null,
                        lic: line.innerText.includes("ODEBRAT") ? "ODEBRAT ZBROJNÍ PRŮKAZ" : null
                    };
                })
            }));
            renderLaws();
        } catch(e) { console.error("Chyba načítání tresty.html"); }
    }

    function renderLaws() {
        const container = document.getElementById('lawsContainer');
        const search = document.getElementById('searchInput').value.toLowerCase();

        container.innerHTML = allLaws.filter(l => l.title.toLowerCase().includes(search)).map(law => {
            const rows = law.subs.map((sub, idx) => `
                <div style="padding:12px 0; border-bottom:1px solid #222; display:flex; align-items:center; gap:10px;">
                    <div style="flex:1; font-size:13px;">${sub.html}</div>
                    <div style="display:flex; gap:5px;">
                        <input type="number" class="input-box input-jail" id="j_${law.title}_${idx}" 
                            value="${sub.fixJail !== null ? sub.fixJail : ''}"
                            placeholder="Let" 
                            ${sub.fixJail !== null ? 'disabled' : ''}>
                        
                        <input type="number" class="input-box input-fine" id="f_${law.title}_${idx}" 
                            value="${sub.fixFine !== null ? sub.fixFine : ''}"
                            placeholder="$" 
                            ${sub.fixFine !== null ? 'disabled' : ''}>
                        
                        <button onclick="addItem('${law.title}', ${idx})" style="background:var(--accent); border:none; padding:8px 15px; border-radius:4px; font-weight:900; cursor:pointer;">+</button>
                    </div>
                </div>`).join('');
            return `<div class="law-card"><div class="law-header" onclick="this.parentElement.classList.toggle('active')"><span>${law.title}</span><span>▼</span></div><div class="law-content">${rows}</div></div>`;
        }).join('');
    }

    function addItem(title, idx) {
        const sub = allLaws.find(l => l.title === title).subs[idx];
        const jVal = parseInt(document.getElementById(`j_${title}_${idx}`).value) || 0;
        const fVal = parseInt(document.getElementById(`f_${title}_${idx}`).value) || 0;

        protocolData.push({ id: Date.now(), title, jail: jVal, fine: fVal, lic: sub.lic });
        renderProtocol();
    }

    function renderProtocol() {
        document.getElementById('caseEntries').innerHTML = protocolData.map(i => `
            <div style="background:#000; padding:15px; border-radius:8px; border-left:4px solid var(--jail-color); margin-bottom:10px; position:relative;">
                <button onclick="removeItem(${i.id})" style="position:absolute; right:10px; top:10px; background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
                <div class="accent-bold" style="font-size:12px;">${i.title}</div>
                <div style="font-weight:bold; margin-top:5px;">
                    <span style="color:var(--jail-color)">${i.jail} let</span> | 
                    <span style="color:var(--fine-color)">$ ${i.fine.toLocaleString()}</span>
                </div>
            </div>`).join('');
        
        const totalJ = protocolData.reduce((a, b) => a + b.jail, 0);
        const totalF = protocolData.reduce((a, b) => a + b.fine, 0);
        document.getElementById('sumJail').innerText = totalJ;
        document.getElementById('sumFine').innerText = totalF.toLocaleString();

        const uniqueLic = [...new Set(protocolData.filter(x => x.lic).map(x => x.lic))];
        document.getElementById('summaryWarnings').innerHTML = uniqueLic.map(l => `<div class="license-tag-red">⚠ ${l}</div>`).join('');
    }

    function removeItem(id) { protocolData = protocolData.filter(x => x.id !== id); renderProtocol(); }

    function saveCase() {
        if (!protocolData.length) return;
        // Zde by byla logika pro odeslání do DB/Discordu
        protocolData = [];
        renderProtocol();
        // Uloženo bez confirm okna
    }

    window.onload = loadLaws;
</script>
</body>
</html>
