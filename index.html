<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - MDT Terminal v53</title>
    <style>
        :root {
            --bg-main: #0a0b0d;
            --bg-panel: #14161a;
            --accent: #ffcc00;
            --danger: #ff4444;
            --jail-color: #00aaff;
            --fine-color: #00ff88;
            --border: #202124;
        }

        body { background: var(--bg-main); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        b, strong, .highlight-gold { color: var(--accent) !important; font-weight: bold; }

        /* PANELY */
        #leftPanel { flex: 3; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #rightPanel { flex: 1.2; min-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; }

        .header-bar { padding: 25px 30px; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
        .header-bar h1 { margin: 0; color: var(--accent); text-transform: uppercase; font-size: 20px; margin-bottom: 15px; }
        
        #lawsContainer { padding: 20px; overflow-y: auto; flex-grow: 1; background: #0c0d0f; }

        /* KARTA ZÁKONA */
        .law-card { background: var(--bg-panel); border: 1px solid var(--border); margin-bottom: 12px; border-radius: 8px; overflow: hidden; }
        .law-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .law-title { font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .law-content { display: none; padding: 15px 20px; background: rgba(0,0,0,0.2); }
        .law-card.active .law-content { display: block; border-top: 1px solid var(--border); }

        /* ČERVENÉ ODEBRAT */
        .license-danger { 
            border: 1px solid var(--danger); color: var(--danger); 
            padding: 2px 8px; border-radius: 4px; font-size: 11px; 
            font-weight: 900; text-transform: uppercase; display: inline-block; margin: 5px 0;
        }

        /* INPUTY */
        .input-box { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; width: 70px; text-align: center; border-radius: 4px; font-weight: bold; outline: none; }
        .jail-input { border-color: var(--jail-color); color: var(--jail-color); }
        .fine-input { border-color: var(--fine-color); color: var(--fine-color); }

        /* PROTOKOL */
        .protocol-item { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid var(--jail-color); margin-bottom: 15px; position: relative; }
        .protocol-law-title { color: var(--accent); font-weight: 900; font-size: 14px; margin-bottom: 8px; text-transform: uppercase; }
        .protocol-law-text { font-size: 12px; color: #ccc; line-height: 1.4; margin-bottom: 12px; }
        
        .edit-row { display: flex; gap: 20px; margin-top: 10px; border-top: 1px solid #1a1a1a; padding-top: 12px; }
        .protocol-edit-input { background: transparent; border: none; border-bottom: 2px solid #333; color: #fff; width: 65px; text-align: center; font-weight: 900; font-size: 15px; outline: none; }

        /* HISTORIE MODAL */
        #historyModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; padding: 40px; }
        .history-box { background: var(--bg-panel); max-width: 700px; margin: 0 auto; height: 80vh; border-radius: 12px; display: flex; flex-direction: column; border: 1px solid var(--border); }

        .summary-box { padding: 25px; background: #000; border-top: 1px solid var(--border); }
        .credits { padding: 10px; font-size: 10px; text-align: center; color: #444; border-top: 1px solid #111; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="historyModal">
    <div class="history-box">
        <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:var(--accent); margin:0;">HISTORIE PŘÍPADŮ</h2>
            <button onclick="toggleHistory()" style="background:none; border:none; color:#fff; cursor:pointer; font-size:20px;">✕</button>
        </div>
        <div id="historyContent" style="flex-grow:1; overflow-y:auto; padding:20px;"></div>
    </div>
</div>

<div id="leftPanel">
    <div class="header-bar">
        <h1>Trestní zákoník</h1>
        <div style="display:flex; gap:10px;">
            <input type="text" id="searchInput" placeholder="Vyhledat..." oninput="renderLaws()" style="flex:2; background:#000; border:1px solid var(--border); color:#fff; padding:10px; border-radius:6px;">
            <select id="sortSelect" onchange="renderLaws()" style="flex:1; background:#000; border:1px solid var(--border); color:var(--accent); padding:10px; border-radius:6px; font-weight:bold;">
                <option value="default">Základní řazení</option>
                <option value="usage">Nejpoužívanější</option>
            </select>
        </div>
    </div>
    <div id="lawsContainer"></div>
</div>

<div id="rightPanel">
    <div style="padding:20px; border-bottom:1px solid var(--border); font-weight:800; color:var(--accent); display:flex; justify-content:space-between; align-items:center;">
        AKTIVNÍ PROTOKOL
        <button onclick="toggleHistory()" style="background:rgba(255,255,255,0.05); border:1px solid #333; color:#888; padding:5px 10px; border-radius:4px; font-size:10px; cursor:pointer;">HISTORIE</button>
    </div>
    <div id="caseEntries" style="flex-grow:1; overflow-y:auto; padding:15px;"></div>
    
    <div class="summary-box">
        <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:10px;">
            <span>CELKEM:</span>
            <span><span id="sumJail" style="color:var(--jail-color)">0</span> let | <span id="sumFine" style="color:var(--fine-color)">0 $</span></span>
        </div>
        <button onclick="saveCase()" style="width:100%; padding:15px; background:var(--jail-color); color:#fff; border:none; border-radius:6px; font-weight:900; cursor:pointer; text-transform:uppercase;">Uložit a Uzavřít</button>
    </div>
    <div class="credits">
        MDT TERMINAL | DESIGN BY MICHAL1448 | POWERED BY GENK
    </div>
</div>

<script>
    let protocolData = [];
    let allLaws = [];
    let lawStats = JSON.parse(localStorage.getItem('sasp_stats')) || {};
    let caseHistory = JSON.parse(localStorage.getItem('sasp_history')) || [];

    function formatLawText(html) {
        return html
            .replace(/(sazba|pokutou|trestá|odnětím svobody)/gi, '<span class="highlight-gold">$1</span>')
            .replace(/ODEBRAT (Zbrojní|Řidičský) Průkaz/gi, '<span class="license-danger">ODEBRAT $1 PRŮKAZ</span>');
    }

    // Funkce pro extrakci limitů z textu (např. "1-5 let" -> min: 1, max: 5)
    function extractLimits(text) {
        const jailMatch = text.match(/(\d+)\s*-\s*(\d+)\s*let/);
        const fineMatch = text.match(/do\s*výše\s*([\d.]+)\s*\$/);
        return {
            maxJail: jailMatch ? parseInt(jailMatch[2]) : 999,
            minJail: jailMatch ? parseInt(jailMatch[1]) : 0,
            maxFine: fineMatch ? parseInt(fineMatch[1].replace('.', '')) : 999999
        };
    }

    async function loadLaws() {
        const res = await fetch('tresty.html?v=' + Date.now());
        const html = await res.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        
        allLaws = Array.from(temp.querySelectorAll('.law-item')).map(item => ({
            title: item.getAttribute('data-title'),
            subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                const limits = extractLimits(line.innerText);
                return {
                    html: line.innerHTML,
                    text: line.innerText,
                    ...limits,
                    fixJail: line.getAttribute('data-fix-jail'),
                    fixFine: line.getAttribute('data-fix-fine')
                };
            })
        }));
        renderLaws();
    }

    function renderLaws() {
        const container = document.getElementById('lawsContainer');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const sortBy = document.getElementById('sortSelect').value;
        
        let filtered = allLaws.filter(l => l.title.toLowerCase().includes(searchTerm));
        if (sortBy === 'usage') filtered.sort((a, b) => (lawStats[b.title] || 0) - (lawStats[a.title] || 0));

        container.innerHTML = filtered.map(law => {
            const rows = law.subs.map((sub, idx) => `
                <div style="padding:12px 0; border-bottom:1px solid #222; display:flex; align-items:center; gap:10px;">
                    <div style="flex:1; font-size:12px; color:#ccc;">${formatLawText(sub.html)}</div>
                    <input type="number" class="input-box jail-input" id="j_${law.title}_${idx}" 
                           min="0" max="${sub.maxJail}" value="${sub.fixJail || ''}" ${sub.fixJail ? 'readonly' : ''} placeholder="Let">
                    <input type="number" class="input-box fine-input" id="f_${law.title}_${idx}" 
                           min="0" max="${sub.maxFine}" value="${sub.fixFine || ''}" ${sub.fixFine ? 'readonly' : ''} placeholder="$">
                    <button class="btn-add" onclick="addItem('${law.title}', ${idx})">+</button>
                </div>`).join('');
            return `<div class="law-card"><div class="law-header" onclick="this.parentElement.classList.toggle('active')"><span class="law-title">${law.title}</span><span>▼</span></div><div class="law-content">${rows}</div></div>`;
        }).join('');
    }

    function addItem(title, idx) {
        const sub = allLaws.find(l => l.title === title).subs[idx];
        const jIn = document.getElementById(`j_${title}_${idx}`);
        const fIn = document.getElementById(`f_${title}_${idx}`);
        
        let jVal = parseInt(jIn.value) || 0;
        let fVal = parseInt(fIn.value) || 0;

        // VALIDACE LIMITŮ
        if (jVal > sub.maxJail) { alert(`Maximální trest pro tento paragraf je ${sub.maxJail} let!`); jVal = sub.maxJail; jIn.value = jVal; }
        if (fVal > sub.maxFine) { alert(`Maximální pokuta je ${sub.maxFine.toLocaleString()} $!`); fVal = sub.maxFine; fIn.value = fVal; }

        lawStats[title] = (lawStats[title] || 0) + 1;
        localStorage.setItem('sasp_stats', JSON.stringify(lawStats));

        protocolData.push({ id: Date.now(), lawTitle: title, fullText: sub.html, jail: jVal, fine: fVal, maxJail: sub.maxJail, maxFine: sub.maxFine });
        renderProtocol();
    }

    function renderProtocol() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = protocolData.map(i => `
            <div class="protocol-item">
                <button onclick="removeItem(${i.id})" style="position:absolute; right:10px; top:10px; background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
                <div class="protocol-law-title">${i.lawTitle}</div>
                <div class="protocol-law-text">${formatLawText(i.fullText)}</div>
                <div class="edit-row">
                    <div style="font-size:11px;">LET: <input type="number" class="protocol-edit-input" value="${i.jail}" oninput="updateVal(${i.id}, 'jail', this.value)"></div>
                    <div style="font-size:11px;">POKUTA $: <input type="number" class="protocol-edit-input" style="width:80px" value="${i.fine}" oninput="updateVal(${i.id}, 'fine', this.value)"></div>
                </div>
            </div>`).join('');
        calculateSum();
    }

    function updateVal(id, key, val) {
        const item = protocolData.find(i => i.id === id);
        if (item) {
            let v = Math.max(0, parseInt(val) || 0);
            if (key === 'jail' && v > item.maxJail) v = item.maxJail;
            if (key === 'fine' && v > item.maxFine) v = item.maxFine;
            item[key] = v;
            calculateSum();
        }
    }

    function calculateSum() {
        let tj = 0, tf = 0;
        protocolData.forEach(i => { tj += i.jail; tf += i.fine; });
        document.getElementById('sumJail').innerText = tj;
        document.getElementById('sumFine').innerText = tf.toLocaleString();
    }

    function removeItem(id) { protocolData = protocolData.filter(x => x.id !== id); renderProtocol(); }

    function saveCase() {
        if (protocolData.length === 0) return;
        caseHistory.unshift({ date: new Date().toLocaleString(), data: [...protocolData] });
        localStorage.setItem('sasp_history', JSON.stringify(caseHistory));
        protocolData = []; renderProtocol();
        alert("Případ uložen do historie.");
    }

    function toggleHistory() {
        const m = document.getElementById('historyModal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
        if (m.style.display === 'block') {
            document.getElementById('historyContent').innerHTML = caseHistory.map(h => `
                <div style="background:#000; padding:15px; border-radius:8px; margin-bottom:10px; border-left:3px solid var(--accent);">
                    <div style="font-size:11px; color:#555; margin-bottom:8px;">${h.date}</div>
                    ${h.data.map(d => `<div style="font-size:12px; margin-bottom:4px;">• <b>${d.lawTitle}</b> (${d.jail} let, ${d.fine} $)</div>`).join('')}
                </div>`).join('');
        }
    }

    window.onload = loadLaws;
</script>
</body>
</html>
