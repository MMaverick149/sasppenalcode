<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Penal Code</title>
    <style>
        /* STYL PŘESNĚ PODLE TVÝCH SCREENSHOTŮ */
        :root {
            --bg: #000000;
            --card-bg: #0c0c0c;
            --accent: #ffcc00;
            --border: #1a1a1a;
            --jail: #00aaff;
            --fine: #00ff88;
            --text-desc: #555;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        /* Seznam zákonů vlevo */
        #lawsContainer {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .law-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            padding: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .law-card.active { border-color: var(--accent); }

        .law-title {
            color: var(--accent);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 15px;
        }

        .law-description {
            color: var(--text-desc);
            font-size: 11px;
            margin-top: 4px;
        }

        .law-content {
            display: none;
            margin-top: 15px;
            border-top: 1px solid #1a1a1a;
            padding-top: 10px;
        }

        .law-card.active .law-content { display: block; }

        /* Řádky trestů */
        .sub-row { margin-bottom: 15px; }
        .sub-text { font-size: 13px; color: #ddd; margin-bottom: 8px; }
        
        .input-group { display: flex; gap: 8px; align-items: center; }
        .input-box {
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 5px;
            width: 65px;
            text-align: center;
            border-radius: 3px;
            font-size: 12px;
        }

        .btn-add {
            background: var(--accent);
            border: none;
            color: #000;
            padding: 5px 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
        }

        /* Protokol vpravo */
        #caseProtocol {
            flex: 1;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
            border-radius: 4px;
        }

        .protocol-title {
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 5px;
        }

        .case-item {
            background: #111;
            border: 1px solid #222;
            border-left: 3px solid var(--accent);
            padding: 10px;
            margin-bottom: 10px;
            position: relative;
            border-radius: 4px;
        }

        .item-vals {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-weight: bold;
        }

        .summary-box {
            margin-top: 25px;
            border-top: 2px solid var(--accent);
            padding-top: 15px;
        }

        .summary-line {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .btn-remove {
            position: absolute;
            right: 8px;
            top: 5px;
            color: #444;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="lawsContainer">
        </div>

    <div id="caseProtocol">
        <div class="protocol-title">AKTIVNÍ PROTOKOL</div>
        <div id="caseEntries"></div>
        
        <div class="summary-box">
            <div class="summary-line">Celkem vězení: <span id="totalJail" style="color:var(--jail)">0 let</span></div>
            <div class="summary-line">Celkem pokuta: <span id="totalFine" style="color:var(--fine)">0 $</span></div>
        </div>
    </div>

    <script>
        let activeCaseItems = [];

        // Pomocná funkce pro placeholders
        function getPlaceholder(text, type) {
            let clean = text.replace(/<[^>]*>?/gm, '').replace(/(\d)\.(\d{3})/g, '$1$2');
            if (type === 'let') {
                let match = clean.match(/(\d+)\s*-\s*(\d+)\s*(?:let|roků)/i);
                return match ? `${match[1]}-${match[2]}` : "Let";
            } else {
                let match = clean.match(/(\d+)\s*-\s*(\d+)\s*\$/i);
                if (!match) match = clean.match(/(?:do|výše)\s*(\d+)\s*\$/i);
                return match ? (match[2] ? `${match[1]}-${match[2]}` : `max ${match[1]}`) : "Suma";
            }
        }

        async function loadLaws() {
            const container = document.getElementById('lawsContainer');
            try {
                const response = await fetch('tresty.html?v=' + Date.now());
                const html = await response.text();
                const temp = document.createElement('div');
                temp.innerHTML = html;
                
                container.innerHTML = ""; 

                temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
                    const title = item.getAttribute('data-title') || "Neznámý §";
                    const desc = item.querySelector('.law-description')?.innerText || "";
                    let rows = "";

                    item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                        const fixFine = line.getAttribute('data-fix-fine');
                        const fixJail = line.getAttribute('data-fix-jail');
                        const innerH = line.innerHTML;

                        rows += `
                        <div class="sub-row">
                            <div class="sub-text">${innerH}</div>
                            <div class="input-group">
                                <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" 
                                    value="${fixJail || ''}" placeholder="${getPlaceholder(innerH, 'let')}" 
                                    ${fixJail !== null ? 'readonly' : ''}>
                                <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" 
                                    value="${fixFine || ''}" placeholder="${getPlaceholder(innerH, 'pokuta')}" 
                                    ${fixFine !== null ? 'readonly' : ''}>
                                <button class="btn-add" onclick="event.stopPropagation(); addToCase('${title}', '${line.innerText.replace(/'/g,"\\'")}', ${lIdx}, ${rIdx})">+</button>
                            </div>
                        </div>`;
                    });

                    const card = document.createElement('div');
                    card.className = 'law-card';
                    card.onclick = function() { this.classList.toggle('active'); };
                    card.innerHTML = `
                        <div class="law-title">${title}</div>
                        <div class="law-description">${desc}</div>
                        <div class="law-content">${rows}</div>`;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error("Chyba načítání:", e);
            }
        }

        function addToCase(title, fullText, lIdx, rIdx) {
            const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
            const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
            if (j === 0 && f === 0) return;

            // Získání čistého popisu varianty (např. "a) je přestupek")
            const subText = fullText.split(')')[0] + ") " + (fullText.split(')')[1] || "").split('.')[0].trim();

            activeCaseItems.push({ title, subText, jail: j, fine: f });
            renderCase();
        }

        function renderCase() {
            const cont = document.getElementById('caseEntries');
            cont.innerHTML = "";
            let jT = 0, fT = 0;

            activeCaseItems.forEach((i, idx) => {
                jT += i.jail; fT += i.fine;
                const div = document.createElement('div');
                div.className = 'case-item';
                div.innerHTML = `
                    <button class="btn-remove" onclick="removeEntry(${idx})">×</button>
                    <div style="color:var(--accent); font-weight:bold; font-size:12px;">${i.title}</div>
                    <div style="font-size:10px; color:#777; margin-top:3px;">${i.subText}</div>
                    <div class="item-vals">
                        <span style="color:var(--jail)">${i.jail} let</span>
                        <span style="color:var(--fine)">${i.fine.toLocaleString()} $</span>
                    </div>`;
                cont.appendChild(div);
            });

            document.getElementById('totalJail').innerText = jT + " let";
            document.getElementById('totalFine').innerText = fT.toLocaleString() + " $";
        }

        function removeEntry(idx) { activeCaseItems.splice(idx, 1); renderCase(); }

        window.onload = loadLaws;
    </script>
</body>
</html>
