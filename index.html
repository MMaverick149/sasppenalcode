<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL v85</title>
    <style>
        :root {
            --bg-main: #0a0b0d; --bg-panel: #14161a;
            --accent: #ffcc00; --danger: #ff4444;
            --jail: #00aaff; --fine: #00ff88; --border: #202124;
        }

        body { background: var(--bg-main); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        b, strong, .bold-yellow { color: var(--accent); font-weight: bold; }

        /* Panely */
        #leftPanel { flex: 3; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #rightPanel { flex: 1.2; min-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; }

        /* Zákoník */
        #lawsContainer { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .law-card { background: var(--bg-panel); border: 1px solid var(--border); margin-bottom: 10px; border-radius: 6px; }
        .law-header { padding: 15px; cursor: pointer; color: var(--accent); font-weight: 800; display: flex; justify-content: space-between; }
        .law-content { display: none; padding: 10px 20px; background: #0f1114; }
        .law-card.active .law-content { display: block; }

        .row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1a1c20; }
        
        /* Inputy */
        .input-box { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; width: 70px; text-align: center; border-radius: 4px; font-weight: bold; outline: none; }
        .input-jail { border-color: var(--jail); }
        .input-fine { border-color: var(--fine); }
        
        /* Blokované pole - Červené */
        .input-box:disabled, .input-box[readonly] { 
            border-color: var(--danger) !important; 
            color: #ff9999 !important; 
            background: rgba(255, 68, 68, 0.05); 
            cursor: not-allowed; 
        }

        .btn-add { background: var(--accent); border: none; padding: 8px 12px; border-radius: 4px; font-weight: 900; cursor: pointer; }

        /* Protokol */
        .protocol-item { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid var(--jail); margin: 10px; position: relative; }
        .proto-inputs { display: flex; gap: 10px; margin-top: 10px; }
        .proto-inputs input { width: 60px; font-size: 12px; padding: 4px; }

        #licenseWarning { background: var(--danger); color: white; padding: 10px; border-radius: 4px; font-weight: 900; text-align: center; margin: 10px; display: none; }
        .summary-box { padding: 20px; background: #000; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="leftPanel">
    <div style="padding: 20px; background: var(--bg-panel);">
        <h2 style="margin:0; color:var(--accent);">TRESTNÍ ZÁKONÍK</h2>
        <input type="text" id="searchInput" placeholder="Hledat v zákoníku..." oninput="render()" style="width:100%; margin-top:15px; background:#000; border:1px solid var(--border); color:#fff; padding:10px; border-radius:4px;">
    </div>
    <div id="lawsContainer"></div>
</div>

<div id="rightPanel">
    <div style="padding:20px; font-weight:800; color:var(--accent); border-bottom:1px solid var(--border);">AKTIVNÍ PROTOKOL PŘÍPADU</div>
    <div id="caseEntries" style="flex-grow:1; overflow-y:auto;"></div>
    
    <div id="licenseWarning">⚠ ODEBRAT ZBROJNÍ PRŮKAZ</div>
    
    <div class="summary-box">
        <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:15px;">
            <span>CELKEM:</span>
            <span><span id="sumJail" style="color:var(--jail)">0</span> let | <span id="sumFine" style="color:var(--fine)">0</span> $</span>
        </div>
        <button onclick="save()" style="width:100%; padding:15px; background:var(--jail); color:white; border:none; border-radius:4px; font-weight:900; cursor:pointer;">ULOŽIT DO DATABÁZE</button>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];

    async function load() {
        // Simulace načtení z tresty.html - v reálu použij fetch
        const mockData = `
            <div class="law-item" data-title="§7 UBLÍŽENÍ NA ZDRAVÍ">
                <div class="sub-line">a) neúmyslně a zbraní <b>sazba 1-5 let</b></div>
                <div class="sub-line">d) úmyslně proti úřední osobě... <b>od 5 let do 15 let</b>. ODEBRAT Průkaz</div>
                <div class="sub-line">f) fixní trest test <b>sazba 10 let</b> pokuta <b>5000$</b></div>
            </div>
            <div class="law-item" data-title="§25 KRÁDEŽ">
                <div class="sub-line">a) do 20.000$ je přestupek... <b>pokutou do 5.000$</b>.</div>
            </div>
        `;
        
        const parser = new DOMParser();
        const doc = parser.parseFromString(mockData, 'text/html');

        laws = Array.from(doc.querySelectorAll('.law-item')).map(item => ({
            title: item.getAttribute('data-title'),
            subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                const text = line.innerText;
                
                // Extrakce limitů pro validaci
                const jailMatch = text.match(/sazba (\d+)-(\d+)|od (\d+) do (\d+)|sazba (\d+) let/i);
                const fineMatch = text.match(/do ([\d.]+)\$|sazba ([\d.]+)\$/i);

                const maxJail = jailMatch ? (jailMatch[2] || jailMatch[4] || jailMatch[5]) : 99;
                const maxFine = fineMatch ? (fineMatch[1] || fineMatch[2]).replace('.', '') : 999999;
                
                // Detekce fixního trestu (pokud je v textu jen jedna hodnota, ne rozmezí)
                const isFixJail = text.includes("sazba") && !text.includes("-") && !text.includes("od");

                return {
                    html: line.innerHTML.replace(/<b>/g, '<b class="bold-yellow">'),
                    fullText: text,
                    maxJail: parseInt(maxJail),
                    maxFine: parseInt(maxFine),
                    isFixJail: isFixJail,
                    isFixFine: text.includes("pokutou") && !text.includes("do"),
                    lic: text.includes("ODEBRAT")
                };
            })
        }));
        render();
    }

    function render() {
        const container = document.getElementById('lawsContainer');
        const search = document.getElementById('searchInput').value.toLowerCase();

        container.innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div class="law-card">
                <div class="law-header" onclick="this.parentElement.classList.toggle('active')">
                    <span>${law.title}</span><span>▼</span>
                </div>
                <div class="law-content">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div style="flex:1; font-size:12px;">${sub.html}</div>
                            <input type="number" class="input-box input-jail" id="j_${lIdx}_${sIdx}" 
                                value="${sub.isFixJail ? sub.maxJail : ''}" placeholder="Let" ${sub.isFixJail ? 'disabled' : ''}>
                            <input type="number" class="input-box input-fine" id="f_${lIdx}_${sIdx}" 
                                value="${sub.isFixFine ? sub.maxFine : ''}" placeholder="$" ${sub.isFixFine ? 'disabled' : ''}>
                            <button class="btn-add" onclick="add(${lIdx}, ${sIdx})">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        let jail = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        let fine = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;

        // VALIDACE LIMITŮ
        if (jail > sub.maxJail) {
            alert(`⚠️ PŘEKROČEN LIMIT! Maximální sazba pro tento paragraf je ${sub.maxJail} let.`);
            jail = sub.maxJail;
        }
        if (fine > sub.maxFine) {
            alert(`⚠️ PŘEKROČEN LIMIT! Maximální pokuta je $${sub.maxFine.toLocaleString()}.`);
            fine = sub.maxFine;
        }

        protocol.push({
            id: Date.now(),
            title: laws[lIdx].title,
            jail: jail,
            fine: fine,
            maxJ: sub.maxJail,
            maxF: sub.maxFine,
            fixJ: sub.isFixJail,
            fixF: sub.isFixFine,
            lic: sub.lic
        });
        updateProtocol();
    }

    function updateProtocol() {
        const list = document.getElementById('caseEntries');
        list.innerHTML = protocol.map((p, idx) => `
            <div class="protocol-item">
                <div style="color:var(--accent); font-weight:900; font-size:12px;">${p.title}</div>
                <div class="proto-inputs">
                    <div>
                        <span style="font-size:10px; color:var(--jail)">LET</span><br>
                        <input type="number" class="input-box" value="${p.jail}" 
                            ${p.fixJ ? 'readonly' : ''} onchange="edit(${idx}, 'jail', this.value)">
                    </div>
                    <div>
                        <span style="font-size:10px; color:var(--fine)">POKUTA</span><br>
                        <input type="number" class="input-box" value="${p.fine}" 
                            ${p.fixF ? 'readonly' : ''} onchange="edit(${idx}, 'fine', this.value)">
                    </div>
                </div>
                <button onclick="remove(${p.id})" style="position:absolute; right:10px; top:10px; background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">✕</button>
            </div>
        `).join('');

        document.getElementById('licenseWarning').style.display = protocol.some(p => p.lic) ? 'block' : 'none';
        document.getElementById('sumJail').innerText = protocol.reduce((a, b) => a + b.jail, 0);
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    function edit(idx, type, val) {
        let v = parseInt(val) || 0;
        const p = protocol[idx];
        
        // Validace i při editaci v protokolu
        if (type === 'jail' && v > p.maxJ) { alert("Překročen limit!"); v = p.maxJ; }
        if (type === 'fine' && v > p.maxF) { alert("Překročen limit!"); v = p.maxF; }
        
        protocol[idx][type] = v;
        updateProtocol();
    }

    function remove(id) { protocol = protocol.filter(x => x.id !== id); updateProtocol(); }
    function save() { alert("Případ uložen do systému."); protocol = []; updateProtocol(); }

    load();
</script>
</body>
</html>
