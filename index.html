<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASP - Penal Code</title>
    <style>
        :root {
            --bg-dark: #050505;
            --card-bg: #111111;
            --accent: #ffcc00; 
            --accent-dim: rgba(255, 204, 0, 0.05);
            --jail: #00ccff;
            --fine: #00ff88;
            --danger: #ff4444;
            --border: #222;
            --text-main: #ddd;
            --text-dim: #777;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        /* Levý panel - Zákony */
        #lawsContainer {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Pravý panel - Protokol */
        #caseProtocol {
            flex: 1;
            background: #0a0a0a;
            border-left: 2px solid var(--border);
            padding: 20px;
            position: sticky;
            top: 20px;
            height: fit-content;
            min-height: 400px;
        }

        /* Karta zákona */
        .law-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .law-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.1);
        }

        .law-header {
            padding: 15px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid transparent;
        }

        .law-card.active .law-header {
            border-bottom: 1px solid var(--border);
            background: #181818;
        }

        .law-title {
            color: var(--accent);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .law-header-desc {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .law-content {
            display: none;
            padding: 10px;
        }

        .law-card.active .law-content {
            display: block;
        }

        /* Sub-row styling */
        .sub-row {
            padding: 10px;
            border-bottom: 1px solid #1a1a1a;
            transition: background 0.2s;
        }

        .sub-row:last-child { border-bottom: none; }
        .sub-row:hover { background: #151515; }

        .row-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .sub-text {
            font-size: 12px;
            color: #bbb;
            flex: 1;
        }

        .sub-text b { color: #fff; }

        /* Inputy */
        .input-group {
            display: flex;
            gap: 5px;
        }

        .input-box {
            width: 55px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 5px;
            text-align: center;
            font-size: 11px;
            border-radius: 2px;
        }

        .input-box:focus { border-color: var(--accent); outline: none; }
        .input-box[readonly] { color: var(--text-dim); cursor: not-allowed; }

        .btn-add {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 2px;
        }

        .btn-add:hover { background: #fff; }

        /* Protokol záznamy */
        .case-item {
            background: #151515;
            border: 1px solid #222;
            padding: 10px;
            margin-bottom: 8px;
            position: relative;
        }

        .btn-remove {
            position: absolute;
            right: 5px;
            top: 5px;
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-weight: bold;
        }

        .item-alert {
            font-size: 9px;
            color: var(--danger);
            font-weight: bold;
            margin-top: 3px;
        }

        .red-alert-bar {
            background: rgba(255, 68, 68, 0.15);
            color: var(--danger);
            font-size: 9px;
            padding: 3px 6px;
            margin-top: 5px;
            border-left: 2px solid var(--danger);
        }

        .summary-box {
            margin-top: 20px;
            border-top: 2px solid var(--accent);
            padding-top: 15px;
        }

        .summary-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="lawsContainer">
        </div>

    <div id="caseProtocol">
        <h2 style="color:var(--accent); font-size: 16px; text-transform: uppercase;">Aktivní Protokol</h2>
        <div id="caseEntries"></div>
        
        <div class="summary-box">
            <div class="summary-line">Celkem vězení: <span id="totalJail" style="color:var(--jail)">0 let</span></div>
            <div class="summary-line">Celkem pokuta: <span id="totalFine" style="color:var(--fine)">0 $</span></div>
            <div id="licenseAlert" style="display:none; margin-top:10px; color:var(--danger); font-size:11px; font-weight:bold;">
                ⚠ ODEBRAT PRŮKAZY: <span id="docsList"></span>
            </div>
        </div>
    </div>

    <script>
        let activeCaseItems = [];

        // Chytřejší regex pro čištění částek a let
        function getRange(text) {
            if (!text) return null;
            let clean = text.replace(/(\d)\.(\d{3})/g, '$1$2').replace(/<[^>]*>?/gm, '');
            let match = clean.match(/(\d+)\s*-\s*(\d+)/);
            if (match) return { min: parseInt(match[1]), max: parseInt(match[2]) };
            let maxMatch = clean.match(/(?:do|max|výše)\s*(\d+)/i);
            if (maxMatch) return { min: 0, max: parseInt(maxMatch[1]) };
            return null;
        }

        function validateInput(el, min, max) {
            let val = parseInt(el.value);
            if (!isNaN(val) && (val < min || val > max)) el.style.borderColor = "red";
            else el.style.borderColor = "#333";
        }

        async function loadLaws() {
            const container = document.getElementById('lawsContainer');
            // Simulace fetch nebo tvůj reálný endpoint
            try {
                const response = await fetch('tresty.html?v=' + Date.now());
                const html = await response.text();
                const temp = document.createElement('div');
                temp.innerHTML = html;
                
                container.innerHTML = ""; 

                temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
                    const title = item.getAttribute('data-title') || "Paragraf";
                    const desc = item.querySelector('.law-description')?.innerText || "";
                    let rows = "";

                    item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                        const fixFine = line.getAttribute('data-fix-fine');
                        const fixJail = line.getAttribute('data-fix-jail');
                        const innerH = line.innerHTML;
                        const cleanText = line.innerText.split('ODEBRAT')[0].trim();

                        const jailRange = getRange(innerH.includes('let') || innerH.includes('rok') ? innerH : "");
                        const fineRange = getRange(innerH.includes('$') ? innerH : "");

                        let alerts = [];
                        if (innerH.toUpperCase().includes("ŘIDIČ")) alerts.push("ŘP");
                        if (innerH.toUpperCase().includes("ZBROJNÍ")) alerts.push("ZP");

                        rows += `
                        <div class="sub-row">
                            <div class="row-main">
                                <div class="sub-text">${innerH}</div>
                                <div class="input-group">
                                    <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" 
                                        value="${fixJail || ''}" placeholder="${jailRange ? jailRange.min+'-'+jailRange.max : 'Let'}" 
                                        ${fixJail !== null ? 'readonly' : ''}
                                        oninput="validateInput(this, ${jailRange?.min || 0}, ${jailRange?.max || 999})">
                                    <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" 
                                        value="${fixFine || ''}" placeholder="${fineRange ? fineRange.min+'-'+fineRange.max : 'Suma'}" 
                                        ${fixFine !== null ? 'readonly' : ''}
                                        oninput="validateInput(this, ${fineRange?.min || 0}, ${fineRange?.max || 999999})">
                                    <button class="btn-add" onclick="addToCase('${title}', '${cleanText.replace(/'/g,"\\'")}', ${lIdx}, ${rIdx})">+</button>
                                </div>
                            </div>
                            ${alerts.map(a => `<div class="red-alert-bar">ODEBRAT ${a === 'ŘP' ? 'ŘIDIČSKÝ' : 'ZBROJNÍ'} PRŮKAZ</div>`).join("")}
                        </div>`;
                    });

                    const card = document.createElement('div');
                    card.className = 'law-card';
                    card.innerHTML = `
                        <div class="law-header" onclick="this.parentElement.classList.toggle('active')">
                            <span class="law-title">${title}</span>
                            <span class="law-header-desc">${desc}</span>
                        </div>
                        <div class="law-content">${rows}</div>`;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = "<p style='color:red'>Chyba při načítání souboru tresty.html</p>";
            }
        }

        function addToCase(title, fullText, lIdx, rIdx) {
            const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
            const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
            
            if (j === 0 && f === 0 && !fullText.includes("svobody")) return;

            let docs = [];
            if (fullText.toUpperCase().includes("ŘIDIČ")) docs.push("ŘP");
            if (fullText.toUpperCase().includes("ZBROJNÍ")) docs.push("ZP");

            // Extrakce varianty (a, b, c) pro čistší zápis
            const variant = fullText.split(')')[0] + ")";
            const shortText = fullText.includes(')') ? fullText.split(')')[1].split('.')[0] : fullText;

            activeCaseItems.push({ 
                title: title, 
                subText: variant + " " + shortText, 
                jail: j, 
                fine: f, 
                docs 
            });
            renderCase();
        }

        function renderCase() {
            const cont = document.getElementById('caseEntries');
            cont.innerHTML = "";
            let jT = 0, fT = 0, dS = new Set();

            activeCaseItems.forEach((i, idx) => {
                jT += i.jail; fT += i.fine; i.docs.forEach(d => dS.add(d));
                const div = document.createElement('div');
                div.className = 'case-item';
                div.innerHTML = `
                    <button class="btn-remove" onclick="removeEntry(${idx})">×</button>
                    <div style="color:var(--accent); font-weight:bold; font-size:11px;">${i.title}</div>
                    <div style="font-size:10px; color:#888; margin-bottom:5px;">${i.subText}</div>
                    ${i.docs.map(d => `<div class="item-alert">ODEBRAT ${d}</div>`).join("")}
                    <div style="display:flex; justify-content:space-between; border-top:1px solid #222; padding-top:5px; margin-top:5px; font-size:11px;">
                        <span style="color:var(--jail)">${i.jail} let</span>
                        <span style="color:var(--fine)">${i.fine.toLocaleString()} $</span>
                    </div>`;
                cont.appendChild(div);
            });

            document.getElementById('totalJail').innerText = jT + " let";
            document.getElementById('totalFine').innerText = fT.toLocaleString() + " $";
            document.getElementById('licenseAlert').style.display = dS.size > 0 ? 'block' : 'none';
            document.getElementById('docsList').innerText = Array.from(dS).join(", ");
        }

        function removeEntry(idx) { activeCaseItems.splice(idx, 1); renderCase(); }
        
        window.onload = loadLaws;
    </script>
</body>
</html>
